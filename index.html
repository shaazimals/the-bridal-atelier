<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VowsDB | Precious Memories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f7f3f0; /* Pearl Base Color */
            background-image: radial-gradient(circle at center, #ffffff 0%, #f7f3f0 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .charm { font-family: 'Charm', cursive; }
        .elegant { font-family: 'Playfair Display', serif; }

        /* === STATIC PEARL SPARKLES (Persis Gambar) === */
        .sparkle-container { position: relative; display: inline-block; }
        .glow-dot {
            position: absolute;
            background: white;
            border-radius: 50%;
            filter: blur(2px);
            opacity: 0.6;
            box-shadow: 0 0 10px 2px white;
            pointer-events: none;
        }

        /* Glassmorphism Frosted */
        .frosted-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 50px;
            box-shadow: 0 25px 60px rgba(180, 160, 150, 0.1);
        }

        /* Button Gradient Pearl */
        .btn-pearl {
            background: linear-gradient(135deg, #eaddd7 0%, #c9b0a7 100%);
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            letter-spacing: 0.1em;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(201, 176, 167, 0.4);
        }
        .btn-pearl:hover { transform: scale(1.02); box-shadow: 0 15px 35px rgba(201, 176, 167, 0.6); }

        .page-fade { transition: all 1s ease-in-out; }
        .hidden-fade { opacity: 0; transform: translateY(20px); }

        /* Floating Animation for Header */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float-anim { animation: float 6s ease-in-out infinite; }
    </style>
</head>
<body class="text-[#8e7d77]">

    <div id="loginSection" class="fixed inset-0 z-[100] flex items-center justify-center p-6 page-fade">
        <div class="max-w-4xl w-full text-center">
            <p class="elegant italic text-[#c9b0a7] text-lg mb-4 opacity-80">In Harmony & Love</p>
            
            <div class="frosted-panel p-16 md:p-24 relative overflow-hidden">
                <div class="sparkle-container">
                    <div class="glow-dot w-3 h-3 -top-4 -left-6"></div>
                    <div class="glow-dot w-2 h-2 top-0 -right-8"></div>
                    <div class="glow-dot w-4 h-4 -bottom-6 left-10"></div>
                    <div class="glow-dot w-2 h-2 top-10 right-20"></div>
                    
                    <h2 class="charm text-8xl md:text-9xl text-[#c9b0a7] mb-6">VowsDB</h2>
                </div>

                <p class="elegant italic text-xs tracking-[0.4em] uppercase text-[#b4a096] mb-12">
                    Curating your precious memories
                </p>

                <div id="googleBtnWrapper" class="relative inline-block">
                    <div class="glow-dot w-2 h-2 -top-2 -right-4"></div>
                    <div id="googleBtn"></div>
                </div>
                
                <p class="text-[10px] mt-20 opacity-50 tracking-widest">By Haazima</p>
            </div>
        </div>
    </div>

    <div id="setupName" class="fixed inset-0 z-[110] flex items-center justify-center p-6 page-fade hidden hidden-fade">
        <div class="max-w-md w-full space-y-10 text-center">
            <h3 class="charm text-6xl text-[#c9b0a7]">Personalize</h3>
            <div class="frosted-panel p-10 space-y-6">
                <input type="text" id="inputUser" placeholder="Your Name" class="w-full p-5 rounded-2xl border-none bg-white/60 text-center text-sm outline-none focus:ring-2 focus:ring-[#eaddd7]">
                <input type="text" id="inputPartner" placeholder="Partner Name" class="w-full p-5 rounded-2xl border-none bg-white/60 text-center text-sm outline-none focus:ring-2 focus:ring-[#eaddd7]">
                <button onclick="saveProfile()" class="w-full btn-pearl py-5 rounded-full font-bold text-xs uppercase">
                    Start Our Journey ✨
                </button>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-4xl mx-auto px-6 pt-24 page-fade hidden hidden-fade pb-32">
        <header class="flex flex-col md:flex-row justify-between items-center mb-24 gap-12">
            <div class="text-center md:text-left float-anim">
                <p class="elegant italic text-[#c9b0a7] text-xl mb-2">Our Story</p>
                <h1 id="titleDisplay" class="charm text-7xl text-[#8e7d77]">Siti & Partner</h1>
                <button onclick="logout()" class="text-[10px] tracking-[0.5em] uppercase mt-6 opacity-40 hover:opacity-100 transition-opacity">Sign Out —</button>
            </div>
            <div class="bg-white/40 backdrop-blur-md p-10 rounded-[3rem] border border-white/60 text-center shadow-sm">
                <p class="text-[9px] font-bold uppercase tracking-[0.4em] mb-3 opacity-60">Total Value</p>
                <p id="totalPrice" class="text-4xl font-bold text-[#8e7d77] tracking-tighter">Rp0</p>
            </div>
        </header>

        <div class="frosted-panel p-10 mb-28">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <select id="cat" class="w-full p-5 rounded-2xl bg-white/50 border-none text-xs font-bold outline-none cursor-pointer">
                    <option>Wedding Attire</option><option>Bridal Beauty</option><option>Jewelry</option><option>Sacred Moments</option>
                </select>
                <input type="number" id="price" placeholder="Price (Rp)" class="w-full p-5 rounded-2xl bg-white/50 border-none text-xs outline-none">
                <input type="text" id="name" placeholder="Name of treasure..." class="md:col-span-2 w-full p-5 rounded-2xl bg-white/50 border-none text-xs outline-none">
                <input type="text" id="img" placeholder="Pinterest Image Link" class="md:col-span-2 w-full p-5 rounded-2xl bg-white/50 border-none text-xs outline-none">
            </div>
            <button onclick="addItem()" id="btnSimpan" class="w-full mt-8 btn-pearl py-5 rounded-full font-bold text-xs uppercase tracking-widest">
                Save to Love List ✨
            </button>
        </div>

        <div id="content" class="space-y-32"></div>
    </div>

    <script>
        const CLIENT_ID = "GANTI_DENGAN_CLIENT_ID_KAMU.apps.googleusercontent.com"; 

        let userEmail = localStorage.getItem('user_email');
        let myName = localStorage.getItem('my_name');
        let partnerName = localStorage.getItem('partner_name');

        window.onload = () => {
            if(!userEmail) {
                document.getElementById('loginSection').classList.remove('hidden-fade');
            } else if(!myName || !partnerName) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('setupName').classList.remove('hidden');
                setTimeout(() => document.getElementById('setupName').classList.remove('hidden-fade'), 50);
            } else {
                document.getElementById('loginSection').classList.add('hidden');
                showMainApp();
            }
            renderGoogleButton();
        };

        function renderGoogleButton() {
            google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById("googleBtn"), { 
                theme: "filled_blue", size: "large", shape: "pill", width: 250 
            });
        }

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('user_email', payload.email);
            document.getElementById('loginSection').classList.add('hidden-fade');
            setTimeout(() => {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('setupName').classList.remove('hidden');
                setTimeout(() => document.getElementById('setupName').classList.remove('hidden-fade'), 50);
            }, 1000);
        }

        function saveProfile() {
            const m = document.getElementById('inputUser').value;
            const p = document.getElementById('inputPartner').value;
            if(m && p) {
                localStorage.setItem('my_name', m);
                localStorage.setItem('partner_name', p);
                document.getElementById('setupName').classList.add('hidden-fade');
                setTimeout(() => {
                    document.getElementById('setupName').classList.add('hidden');
                    showMainApp();
                }, 1000);
            }
        }

        function showMainApp() {
            const app = document.getElementById('app');
            app.classList.remove('hidden');
            setTimeout(() => app.classList.remove('hidden-fade'), 50);
            document.getElementById('titleDisplay').innerText = `${localStorage.getItem('my_name')} & ${localStorage.getItem('partner_name')}`;
            loadData();
        }

        async function loadData() {
            const res = await fetch(`/api/manage?email=${localStorage.getItem('user_email')}`);
            const data = await res.json();
            render(Array.isArray(data) ? data : []);
        }

        async function addItem() {
            const body = {
                user_email: localStorage.getItem('user_email'),
                partner_name: `${localStorage.getItem('my_name')} & ${localStorage.getItem('partner_name')}`,
                category: document.getElementById('cat').value,
                item_name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value) || 0,
                img_url: document.getElementById('img').value || ''
            };
            await fetch('/api/manage', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            loadData();
            document.getElementById('name').value = ''; document.getElementById('price').value = ''; document.getElementById('img').value = '';
        }

        function render(data) {
            const container = document.getElementById('content');
            const totalDisplay = document.getElementById('totalPrice');
            container.innerHTML = '';
            const total = data.reduce((s, i) => s + i.price, 0);
            totalDisplay.innerText = `Rp${total.toLocaleString('id-ID')}`;
            const grouped = data.reduce((r, a) => { r[a.category] = [...r[a.category] || [], a]; return r; }, {});

            for (const cat in grouped) {
                let html = `
                    <div class="fade-in-up">
                        <div class="flex items-center gap-8 mb-12">
                            <h3 class="elegant italic text-2xl">${cat}</h3>
                            <div class="h-[1px] flex-grow bg-[#c9b0a7]/30"></div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12">`;
                
                grouped[cat].forEach(i => {
                    html += `
                        <div class="bg-white/80 rounded-[3rem] overflow-hidden shadow-sm hover:shadow-xl transition-all duration-700 group border-[6px] border-white relative">
                            <div class="relative aspect-[4/5] overflow-hidden">
                                <button onclick="deleteItem(${i.id})" class="absolute top-5 right-5 bg-white/90 text-[#c9b0a7] w-10 h-10 rounded-full z-20 opacity-0 group-hover:opacity-100 transition-all font-bold">✕</button>
                                <img src="${i.img_url || 'https://via.placeholder.com/600x800'}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000">
                            </div>
                            <div class="p-8">
                                <p class="text-[9px] text-[#c9b0a7] uppercase tracking-[0.4em] mb-2">${cat}</p>
                                <p class="elegant text-lg mb-3">${i.item_name}</p>
                                <p class="text-[#c9b0a7] font-bold text-lg">Rp${i.price.toLocaleString('id-ID')}</p>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            }
        }

        async function deleteItem(id) { if(confirm("Hapus?")) { await fetch(`/api/manage?id=${id}`, { method: 'DELETE' }); loadData(); } }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
