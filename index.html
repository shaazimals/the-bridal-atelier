<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VowsDB | Pearl Luxe Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at center, #ffffff 0%, #f7f3f0 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .charm { font-family: 'Charm', cursive; }
        .elegant { font-family: 'Playfair Display', serif; }

        /* === GLOW SPARKLES WARNA FONT (#c9b0a7) === */
        .sparkle-container { position: relative; display: inline-block; }
        
        .glow-dot {
            position: absolute;
            background: #c9b0a7; /* WARNA SAMA DENGAN FONT */
            border-radius: 50%;
            filter: blur(0.5px);
            /* Cahaya glow juga pakai warna senada tapi transparan */
            box-shadow: 
                0 0 10px 2px rgba(201, 176, 167, 0.8),
                0 0 20px 5px rgba(201, 176, 167, 0.4);
            animation: sparklePulse 4s infinite ease-in-out;
            pointer-events: none;
            z-index: 20;
        }

        /* Bintang (+) di tengah glow pakai warna putih biar tajam */
        .glow-dot::before, .glow-dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            background: white;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 5px white;
        }
        .glow-dot::before { width: 1px; height: 160%; }
        .glow-dot::after { width: 160%; height: 1px; }

        @keyframes sparklePulse {
            0%, 100% { opacity: 0.6; transform: scale(0.8) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.1) rotate(90deg); }
        }

        /* Frosted Glass Panel */
        .frosted-panel {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(40px);
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 60px;
            box-shadow: 0 40px 100px rgba(180, 160, 150, 0.15);
        }

        .btn-pearl {
            background: linear-gradient(135deg, #eaddd7 0%, #c9b0a7 100%);
            color: white;
            letter-spacing: 0.2em;
            transition: all 0.5s;
            box-shadow: 0 15px 35px rgba(201, 176, 167, 0.4);
        }
        .btn-pearl:hover { transform: translateY(-3px) scale(1.03); filter: brightness(1.05); }

        .hidden-fade { opacity: 0; transform: translateY(30px); pointer-events: none; }
        .page-transition { transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-[#8e7d77]">

    <div id="loginSection" class="fixed inset-0 z-[100] flex items-center justify-center p-6 page-transition">
        <div class="max-w-4xl w-full text-center">
            <p class="elegant italic text-[#c9b0a7] text-xl mb-6 opacity-70">In Harmony & Love</p>
            
            <div class="frosted-panel p-20 md:p-32 relative">
                <div class="sparkle-container">
                    <div class="glow-dot w-3 h-3 -top-8 -left-12"></div>
                    <div class="glow-dot w-2 h-2 -top-4 right-10" style="animation-delay: 1s;"></div>
                    <div class="glow-dot w-3 h-3 bottom-0 -right-14" style="animation-delay: 2s;"></div>
                    <div class="glow-dot w-2 h-2 top-20 -left-16" style="animation-delay: 0.5s;"></div>
                    
                    <h2 class="charm text-8xl md:text-[10rem] text-[#c9b0a7] leading-none mb-8">VowsDB</h2>
                </div>

                <p class="elegant italic text-[10px] tracking-[0.5em] uppercase text-[#b4a096] mb-16">
                    Curating your precious memories
                </p>

                <div class="relative inline-block">
                    <div id="googleBtn"></div>
                </div>
                
                <p class="text-[9px] mt-24 opacity-40 tracking-[0.3em] uppercase font-bold">By Haazima</p>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = "GANTI_DENGAN_CLIENT_ID_KAMU.apps.googleusercontent.com"; 

        let userEmail = localStorage.getItem('user_email');
        let myName = localStorage.getItem('my_name');
        let partnerName = localStorage.getItem('partner_name');

        window.onload = () => {
            if(!userEmail) {
                document.getElementById('loginSection').classList.remove('hidden-fade');
            } else if(!myName || !partnerName) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('setupName').classList.remove('hidden');
                setTimeout(() => document.getElementById('setupName').classList.remove('hidden-fade'), 50);
            } else {
                document.getElementById('loginSection').classList.add('hidden');
                showMainApp();
            }
            renderGoogleButton();
        };

        function renderGoogleButton() {
            google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById("googleBtn"), { 
                theme: "filled_blue", size: "large", shape: "pill", width: 280 
            });
        }

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('user_email', payload.email);
            document.getElementById('loginSection').classList.add('hidden-fade');
            setTimeout(() => {
                document.getElementById('loginSection').classList.add('hidden');
                showSetupName();
            }, 1200);
        }

        function showSetupName() {
            // Logic setup nama jika diperlukan
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
