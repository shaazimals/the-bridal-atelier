<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bridal Atelier by Haazima</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at center, #fffafa 0%, #f9f0f0 100%);
            min-height: 100vh;
            color: #7a5c5c;
        }
        .charm { font-family: 'Charm', cursive; }
        .elegant { font-family: 'Playfair Display', serif; }

        /* === ROSE GOLD SUPER GLOW SPARKLES === */
        .sparkle-container { position: relative; display: inline-block; }
        .glow-dot {
            position: absolute;
            background: #e5b3b3;
            border-radius: 50%;
            filter: blur(1px);
            box-shadow: 0 0 15px 5px rgba(229, 179, 179, 0.6), 0 0 30px 10px rgba(229, 179, 179, 0.2);
            animation: sparklePulse 4s infinite ease-in-out;
            pointer-events: none;
            z-index: 20;
        }
        .glow-dot::before, .glow-dot::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            background: white; transform: translate(-50%, -50%);
        }
        .glow-dot::before { width: 1px; height: 180%; }
        .glow-dot::after { width: 180%; height: 1px; }

        @keyframes sparklePulse {
            0%, 100% { opacity: 0.5; transform: scale(0.8) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.2) rotate(45deg); }
        }

        /* Frosted Glass */
        .frosted-panel {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(40px);
            border: 1.5px solid rgba(229, 179, 179, 0.3);
            box-shadow: 0 40px 100px rgba(229, 179, 179, 0.1);
        }

        /* Custom Google Login */
        .custom-google-wrapper {
            position: relative;
            display: inline-flex;
            background: linear-gradient(135deg, #f2d1d1 0%, #e5b3b3 100%);
            padding: 2px;
            border-radius: 9999px;
            box-shadow: 0 10px 25px rgba(229, 179, 179, 0.4);
            transition: transform 0.3s ease;
        }
        .custom-google-wrapper:hover { transform: scale(1.05); }
        #googleBtn { position: absolute; inset: 0; opacity: 0.01; z-index: 10; cursor: pointer; }
        .fake-btn {
            background: white;
            padding: 12px 28px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 14px;
            color: #7a5c5c;
        }

        .page-fade { transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden-fade { opacity: 0; transform: translateY(30px); pointer-events: none; }
        
        /* Image Upload Styling */
        .file-input-label {
            background: #fff;
            border: 1px dashed #e5b3b3;
            color: #d69e9e;
            transition: all 0.3s;
        }
        .file-input-label:hover { background: #fff5f5; border-color: #d69e9e; }
    </style>
</head>
<body>

    <div id="loginSection" class="fixed inset-0 z-[100] flex items-center justify-center p-4 page-fade">
        <div class="w-full max-w-4xl text-center">
            <p class="elegant italic text-[#d69e9e] text-lg md:text-xl mb-6 tracking-widest">Login With Goole</p>
            <div class="frosted-panel p-10 md:p-32 rounded-[3rem] md:rounded-[4rem] relative overflow-hidden">
                <div class="sparkle-container mb-8">
                    <div class="glow-dot w-3 h-3 -top-10 -left-12"></div>
                    <div class="glow-dot w-2 h-2 -top-4 right-10" style="animation-delay: 1s;"></div>
                    <div class="glow-dot w-4 h-4 bottom-2 -right-16" style="animation-delay: 2s;"></div>
                    <h2 class="charm text-6xl md:text-[8rem] text-[#d69e9e] leading-tight">The Bridal Atelier</h2>
                </div>
                <p class="elegant italic text-[10px] tracking-[0.5em] uppercase text-[#b4a096] mb-16">Curating your most precious treasures</p>
                <div class="custom-google-wrapper">
                    <div id="googleBtn"></div>
                    <div class="fake-btn">
                        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18">
                        Authenticate Your Sanctuary 
                    </div>
                </div>
                <p class="text-[9px] mt-24 opacity-40 tracking-[0.3em] uppercase font-bold italic">Developed with love by Haazima</p>
            </div>
        </div>
    </div>

    <div id="setupName" class="fixed inset-0 z-[110] flex items-center justify-center p-4 page-fade hidden hidden-fade">
        <div class="w-full max-w-md text-center">
            <h3 class="charm text-6xl text-[#d69e9e] mb-4">The Happy Couple</h3>
            <p class="elegant italic text-gray-400 mb-10 tracking-widest">Identity of the Devoted</p>
            <div class="frosted-panel p-10 rounded-[3rem] space-y-6">
                <input type="text" id="inputUser" placeholder="Her Name" class="w-full p-5 rounded-2xl bg-white/70 border-none text-center outline-none focus:ring-2 focus:ring-[#f2d1d1]">
                <input type="text" id="inputPartner" placeholder="His Name" class="w-full p-5 rounded-2xl bg-white/70 border-none text-center outline-none focus:ring-2 focus:ring-[#f2d1d1]">
                <button onclick="saveProfile()" class="w-full bg-gradient-to-r from-pink-200 to-[#e5b3b3] text-white font-bold py-5 rounded-full text-[10px] tracking-[0.2em] shadow-lg">
                    BEGIN OUR STORY 
                </button>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-5xl mx-auto px-4 md:px-6 pt-10 md:pt-28 page-fade hidden hidden-fade pb-40">
        <header class="flex flex-col md:flex-row justify-between items-center mb-20 gap-8">
            <div class="text-center md:text-left">
                <p class="elegant italic text-[#d69e9e] text-xl">The Eternal Collection of</p>
                <h1 id="titleDisplay" class="charm text-6xl md:text-8xl mt-2 tracking-wide">Mempelai</h1>
                <button onclick="logout()" class="text-[9px] tracking-[0.5em] uppercase mt-6 opacity-40 hover:opacity-100 transition-opacity">— LEAVE THE ATELIER</button>
            </div>
            <div class="bg-white/60 backdrop-blur-xl p-8 md:p-12 rounded-[3rem] md:rounded-[4rem] border border-[#f2d1d1] text-center shadow-sm w-full md:w-auto">
                <p class="text-[9px] font-bold uppercase tracking-[0.4em] mb-3 text-[#d69e9e]">TOTAL INVESTMENT OF LOVE</p>
                <p id="totalPrice" class="text-3xl md:text-5xl font-bold tracking-tighter leading-none">Rp0</p>
            </div>
        </header>

        <div class="frosted-panel p-8 md:p-12 mb-28 rounded-[2.5rem]">
            <h4 class="text-[10px] font-bold text-[#d69e9e] tracking-[0.4em] mb-8 uppercase">Manifest New Treasure</h4>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <select id="cat" class="w-full p-5 rounded-2xl bg-white/70 border-none text-[10px] font-bold outline-none appearance-none cursor-pointer">
                    <option>The Bridal Attire</option><option>Grace & Beauty</option><option>Sacred Jewelry</option><option>The Ceremony Needs</option><option>After the Vows</option>
                </select>
                <input type="number" id="price" placeholder="Estimated Investment (Rp)" class="w-full p-5 rounded-2xl bg-white/70 border-none text-[10px] outline-none">
                <input type="text" id="name" placeholder="Name of your desire..." class="md:col-span-2 w-full p-5 rounded-2xl bg-white/70 border-none text-[10px] outline-none">
                <input type="text" id="img" placeholder="Visual Link (Pinterest) - Optional" class="w-full p-5 rounded-2xl bg-white/70 border-none text-[10px] outline-none">
                <input type="text" id="shopeeLink" placeholder="Shopee Product Link (🧡)" class="w-full p-5 rounded-2xl bg-white/70 border-none text-[10px] outline-none">
            </div>
            <button onclick="addItem()" id="btnSimpan" class="w-full mt-10 bg-gradient-to-r from-pink-200 to-[#e5b3b3] text-white font-bold py-6 rounded-full text-[10px] tracking-[0.2em] shadow-lg uppercase">
                ENSHRINE TO LOVE LIST ✨
            </button>
        </div>

        <div id="content" class="space-y-24 md:space-y-40"></div>
    </div>

    <script>
        const CLIENT_ID = "933906511221-0moeldahtahrn7sjp2ju1np8k8hufs6c.apps.googleusercontent.com"; 

        window.onload = () => {
            google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById("googleBtn"), { theme: "outline", size: "large", width: 280 });
            
            const userEmail = localStorage.getItem('user_email');
            const myName = localStorage.getItem('my_name');
            if(!userEmail) { document.getElementById('loginSection').classList.remove('hidden-fade'); }
            else if(!myName) { 
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('setupName').classList.remove('hidden');
                setTimeout(() => document.getElementById('setupName').classList.remove('hidden-fade'), 50);
            } else { 
                document.getElementById('loginSection').classList.add('hidden');
                showMainApp(); 
            }
        };

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('user_email', payload.email);
            location.reload();
        }

        function saveProfile() {
            const m = document.getElementById('inputUser').value;
            const p = document.getElementById('inputPartner').value;
            if(m && p) {
                localStorage.setItem('my_name', m);
                localStorage.setItem('partner_name', p);
                location.reload();
            }
        }

        function showMainApp() {
            const app = document.getElementById('app');
            app.classList.remove('hidden');
            setTimeout(() => app.classList.remove('hidden-fade'), 50);
            document.getElementById('titleDisplay').innerText = `${localStorage.getItem('my_name')} & ${localStorage.getItem('partner_name')}`;
            loadData();
        }

        async function loadData() {
            const res = await fetch(`/api/manage?email=${localStorage.getItem('user_email')}`);
            const data = await res.json();
            render(Array.isArray(data) ? data : []);
        }

        async function addItem() {
            const btn = document.getElementById('btnSimpan');
            btn.innerText = "Processing Your Dream...";
            
            const body = {
                user_email: localStorage.getItem('user_email'),
                partner_name: `${localStorage.getItem('my_name')} & ${localStorage.getItem('partner_name')}`,
                category: document.getElementById('cat').value,
                item_name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value) || 0,
                img_url: document.getElementById('img').value || 'https://via.placeholder.com/600x800?text=Wedding+Inspiration',
                product_link: document.getElementById('shopeeLink').value || '#'
            };
            
            await fetch('/api/manage', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            loadData();
            document.getElementById('name').value = ''; document.getElementById('price').value = ''; 
            document.getElementById('img').value = ''; document.getElementById('shopeeLink').value = '';
            btn.innerText = "ENSHRINE TO LOVE LIST";
        }

        function render(data) {
            const container = document.getElementById('content');
            const totalDisplay = document.getElementById('totalPrice');
            container.innerHTML = '';
            const total = data.reduce((s, i) => s + i.price, 0);
            totalDisplay.innerText = `Rp${total.toLocaleString('id-ID')}`;
            const grouped = data.reduce((r, a) => { r[a.category] = [...r[a.category] || [], a]; return r; }, {});

            for (const cat in grouped) {
                let html = `
                    <div class="fade-in-up">
                        <div class="flex items-center gap-6 mb-12">
                            <h3 class="elegant italic text-2xl md:text-4xl text-[#d69e9e]">${cat}</h3>
                            <div class="h-[1px] flex-grow bg-[#e5b3b3]/30"></div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-6 md:gap-16">`;
                
                grouped[cat].forEach(i => {
                    const targetLink = i.product_link && i.product_link !== '#' ? i.product_link : 'javascript:void(0)';
                    html += `
                        <div class="bg-white rounded-[2rem] md:rounded-[4rem] overflow-hidden shadow-sm border-[6px] md:border-[12px] border-white relative group">
                            <a href="${targetLink}" target="_blank" rel="noopener noreferrer" class="block overflow-hidden relative aspect-[4/5]">
                                <img src="${i.img_url}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000">
                                <div class="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                    <div class="bg-white/90 px-4 py-2 rounded-full flex items-center gap-2 shadow-xl">
                                        <span class="text-[8px] md:text-[10px] font-bold tracking-widest">SHOP THE LOOK ✨</span>
                                    </div>
                                </div>
                            </a>
                            <div class="p-5 md:p-10">
                                <button onclick="deleteItem(${i.id})" class="absolute top-4 right-4 bg-white/90 text-[#d69e9e] w-8 h-8 rounded-full z-20 font-bold text-[10px] shadow-sm">✕</button>
                                <p class="text-[7px] md:text-[10px] text-[#d69e9e] uppercase tracking-[0.2em] mb-2">${i.category}</p>
                                <a href="${targetLink}" target="_blank">
                                    <p class="elegant text-[10px] md:text-2xl leading-tight line-clamp-1 hover:text-orange-400 transition-colors">${i.item_name}</p>
                                </a>
                                <p class="text-[#d69e9e] font-bold text-[9px] md:text-xl mt-2 md:mt-4 italic tracking-tight">Rp${i.price.toLocaleString('id-ID')}</p>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            }
        }

        async function deleteItem(id) { if(confirm("Remove from collection?")) { await fetch(`/api/manage?id=${id}`, { method: 'DELETE' }); loadData(); } }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
