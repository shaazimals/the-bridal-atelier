<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VowsDB | Estetik Seserahan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fda4af;
            --bg-gradient: linear-gradient(135deg, #fdf2f8 0%, #eef2ff 100%);
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-gradient); min-height: 100vh; }
        .romantic { font-family: 'Dancing Script', cursive; }
        .elegant { font-family: 'Playfair Display', serif; }
        
        /* Efek Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
        }
        .item-card {
            background: white;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(253, 164, 175, 0.2);
        }
        .custom-shadow {
            box-shadow: 0 10px 30px -10px rgba(253, 164, 175, 0.3);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #fda4af; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-800 pb-10">

    <div id="welcome" class="fixed inset-0 z-[100] bg-white/80 backdrop-blur-xl flex items-center justify-center p-6 hidden">
        <div class="max-w-sm w-full text-center space-y-6">
            <div class="relative inline-block">
                <div class="absolute -inset-1 bg-gradient-to-r from-pink-300 to-blue-300 rounded-full blur opacity-30 animate-pulse"></div>
                <h2 class="romantic text-6xl text-pink-500 relative">VowsDB</h2>
            </div>
            <p class="elegant italic text-gray-400 tracking-widest text-xs uppercase">Curating Your Beautiful Moments</p>
            <div class="p-8 glass-card custom-shadow">
                <p class="text-sm text-gray-500 mb-6">Mulai rakit kotak impianmu di sini.</p>
                <div id="googleBtn" class="flex justify-center"></div>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-2xl mx-auto px-4 pt-8">
        <header class="flex justify-between items-end mb-10 px-2">
            <div>
                <p class="elegant italic text-pink-400 text-sm mb-1">Sweetest Devotion</p>
                <h1 id="titleDisplay" class="romantic text-4xl text-gray-800">For My Dearest</h1>
                <button onclick="logout()" class="text-[10px] text-gray-400 hover:text-pink-500 transition-colors tracking-[0.2em] uppercase mt-2">Sign Out —</button>
            </div>
            <div class="text-right bg-white/50 p-4 rounded-2xl border border-white">
                <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mb-1">Accumulated</p>
                <p id="totalPrice" class="text-2xl font-bold text-gray-800 leading-none tracking-tight">Rp0</p>
            </div>
        </header>

        <div class="glass-card p-6 mb-12 custom-shadow">
            <h3 class="text-xs font-bold text-pink-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-pink-400 rounded-full animate-ping"></span>
                Add New Treasure
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-3">
                    <select id="cat" class="w-full bg-white/50 p-3 rounded-xl border border-pink-100 text-xs focus:ring-2 focus:ring-pink-300 outline-none">
                        <option>Skincare</option><option>Body Care</option><option>Fashion</option><option>Ibadah</option><option>Jewelry</option><option>Lainnya</option>
                    </select>
                    <input type="text" id="name" placeholder="Nama Barang" class="w-full bg-white/50 p-3 rounded-xl border border-pink-100 text-xs focus:ring-2 focus:ring-pink-300 outline-none">
                </div>
                <div class="space-y-3">
                    <input type="number" id="price" placeholder="Harga (Rp)" class="w-full bg-white/50 p-3 rounded-xl border border-pink-100 text-xs focus:ring-2 focus:ring-pink-300 outline-none">
                    <input type="text" id="img" placeholder="Link Gambar (Pinterest/Shopee)" class="w-full bg-white/50 p-3 rounded-xl border border-pink-100 text-xs focus:ring-2 focus:ring-pink-300 outline-none">
                </div>
            </div>
            <button onclick="addItem()" id="btnSimpan" class="w-full mt-4 bg-gradient-to-r from-pink-400 to-pink-500 text-white font-bold py-4 rounded-xl text-sm shadow-lg shadow-pink-200 active:scale-[0.98] transition-all">
                Save to My Vows ✨
            </button>
        </div>

        <div id="content" class="space-y-16">
            </div>
    </div>

    <script>
        // MASUKKAN CLIENT ID ASLI KAMU DI SINI
        const CLIENT_ID = "933906511221-0moeldahtahrn7sjp2ju1np8k8hufs6c.apps.googleusercontent.com"; 
        
        let userEmail = localStorage.getItem('user_email');
        let userName = localStorage.getItem('vows_partner');

        window.onload = () => {
            if(!userEmail) {
                document.getElementById('welcome').classList.remove('hidden');
                renderGoogleButton();
            } else {
                document.getElementById('titleDisplay').innerText = `For ${userName}`;
                loadData();
            }
        };

        function renderGoogleButton() {
            google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById("googleBtn"), { theme: "outline", size: "large", shape: "pill" });
        }

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('user_email', payload.email);
            localStorage.setItem('vows_partner', payload.name);
            location.reload();
        }

        async function loadData() {
            const res = await fetch(`/api/manage?email=${userEmail}`);
            const data = await res.json();
            render(Array.isArray(data) ? data : []);
        }

        async function addItem() {
            const btn = document.getElementById('btnSimpan');
            const originalText = btn.innerText;
            btn.innerText = "Curating...";
            btn.disabled = true;

            const body = {
                user_email: userEmail,
                partner_name: userName,
                category: document.getElementById('cat').value,
                item_name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value) || 0,
                img_url: document.getElementById('img').value || ''
            };

            const res = await fetch('/api/manage', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });

            if(res.ok) {
                location.reload();
            } else {
                alert("Gagal simpan.");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        async function deleteItem(id) {
            if(confirm("Hapus kenangan ini?")) {
                await fetch(`/api/manage?id=${id}`, { method: 'DELETE' });
                loadData();
            }
        }

        function render(data) {
            const container = document.getElementById('content');
            const totalDisplay = document.getElementById('totalPrice');
            container.innerHTML = '';
            
            const total = data.reduce((s, i) => s + i.price, 0);
            totalDisplay.innerText = `Rp${total.toLocaleString('id-ID')}`;

            const grouped = data.reduce((r, a) => {
                r[a.category] = [...r[a.category] || [], a];
                return r;
            }, {});

            for (const cat in grouped) {
                let html = `
                    <div class="animate-fade-in">
                        <div class="flex items-center gap-4 mb-6">
                            <h3 class="elegant italic text-xl text-gray-700">${cat}</h3>
                            <div class="h-[1px] flex-grow bg-gradient-to-r from-pink-200 to-transparent"></div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-6">`;
                
                grouped[cat].forEach(i => {
                    html += `
                        <div class="item-card group overflow-hidden border border-white shadow-sm hover:shadow-xl">
                            <div class="relative overflow-hidden aspect-square">
                                <button onclick="deleteItem(${i.id})" class="absolute top-2 right-2 bg-white/90 text-pink-400 w-7 h-7 rounded-full text-[10px] z-10 opacity-0 group-hover:opacity-100 transition-all duration-300 transform translate-y-[-10px] group-hover:translate-y-0 shadow-sm font-bold">✕</button>
                                <img src="${i.img_url || 'https://via.placeholder.com/400x400?text=Beauty'}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/400x400?text=Product'">
                            </div>
                            <div class="p-4">
                                <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-1">${cat}</p>
                                <p class="text-xs font-semibold text-gray-700 line-clamp-1 mb-2 uppercase">${i.item_name}</p>
                                <p class="text-pink-500 font-bold text-sm tracking-tighter italic">Rp${i.price.toLocaleString('id-ID')}</p>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
