<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VowsDB | Pearl Wedding Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            /* Background warna Pearl/Creamy White */
            background: radial-gradient(circle at top, #fffafb 0%, #f7f3f0 100%); 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        .charm { font-family: 'Charm', cursive; }
        .elegant { font-family: 'Playfair Display', serif; }
        
        /* === SOFT PEARL SPARKLES === */
        #pearl-layer { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
        .pearl-sparkle { 
            position: absolute; 
            background: radial-gradient(circle, #ffffff 0%, #fff4e6 100%); 
            border-radius: 50%; 
            filter: blur(1px);
            animation: pearlFloat 5s infinite ease-in-out; 
            opacity: 0; 
        }
        @keyframes pearlFloat {
            0% { transform: scale(0) translateY(0); opacity: 0; }
            50% { transform: scale(1) translateY(-20px); opacity: 0.5; }
            100% { transform: scale(0) translateY(-40px); opacity: 0; }
        }

        /* Glassmorphism Mutiara */
        .glass-card { 
            background: rgba(255, 255, 255, 0.45); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.9); 
            border-radius: 40px; 
            box-shadow: 0 15px 35px rgba(212, 185, 175, 0.1);
        }

        .input-wedding { 
            background: rgba(255, 255, 255, 0.9); 
            border: 1px solid #f3ece7; 
            border-radius: 20px;
            transition: all 0.4s;
        }
        .input-wedding:focus { border-color: #d4b9af; box-shadow: 0 0 15px rgba(212, 185, 175, 0.2); outline: none; }
        
        .pearl-btn {
            background: linear-gradient(135deg, #e7d8d2 0%, #d4b9af 100%);
            color: #5d4a44;
            box-shadow: 0 8px 20px rgba(212, 185, 175, 0.3);
            transition: all 0.3s;
        }
        .pearl-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }

        .page-fade { transition: all 1s ease-in-out; }
        .hidden-fade { opacity: 0; transform: scale(1.02); }
    </style>
</head>
<body>

    <div id="pearl-layer"></div>

    <div id="loginSection" class="fixed inset-0 z-[100] flex items-center justify-center p-6 page-fade hidden">
        <div class="max-w-sm w-full text-center space-y-12">
            <div class="space-y-4">
                <h2 class="charm text-8xl text-[#d4b9af] drop-shadow-sm">VowsDB</h2>
                <p class="elegant italic text-gray-400 uppercase tracking-[0.4em] text-[10px]">Elegance in Every Detail</p>
            </div>
            <div class="p-12 glass-card shadow-xl">
                <div id="googleBtn" class="flex justify-center"></div>
            </div>
        </div>
    </div>

    <div id="setupName" class="fixed inset-0 z-[110] flex items-center justify-center p-6 page-fade hidden">
        <div class="max-w-md w-full space-y-10 text-center">
            <h3 class="charm text-6xl text-[#d4b9af]">Our Beginning</h3>
            <div class="p-10 glass-card space-y-6">
                <input type="text" id="inputUser" placeholder="Nama Kamu" class="w-full p-5 input-wedding text-sm text-center">
                <div class="charm text-4xl text-[#e7d8d2]">and</div>
                <input type="text" id="inputPartner" placeholder="Nama Pasangan" class="w-full p-5 input-wedding text-sm text-center">
                <button onclick="saveProfile()" class="w-full pearl-btn font-bold py-5 rounded-2xl mt-4 uppercase tracking-widest text-xs">
                    Start Our Journey ✨
                </button>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-3xl mx-auto px-6 pt-20 relative z-10 page-fade hidden-fade hidden">
        <header class="flex flex-col md:flex-row justify-between items-center mb-24 gap-8">
            <div class="text-center md:text-left">
                <p class="elegant italic text-[#d4b9af] text-lg">Pure Love Story</p>
                <h1 id="titleDisplay" class="charm text-7xl text-gray-800 mt-2 leading-tight">Siti & Maas</h1>
                <button onclick="logout()" class="text-[9px] text-gray-400 hover:text-[#d4b9af] tracking-[0.4em] uppercase mt-6 block mx-auto md:mx-0">— Sign Out</button>
            </div>
            <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-gray-50 min-w-[280px] text-center">
                <p class="text-[9px] text-[#d4b9af] font-bold uppercase tracking-[0.3em] mb-3">Allocated Budget</p>
                <p id="totalPrice" class="text-4xl font-bold text-gray-800 tracking-tighter">Rp0</p>
            </div>
        </header>

        <div class="glass-card p-10 mb-28 border-white shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <select id="cat" class="w-full p-5 input-wedding text-xs font-bold appearance-none">
                    <option>Wedding Attire</option><option>Bridal Beauty</option><option>Groom's Needs</option><option>Sacred Rituals</option><option>Other Details</option>
                </select>
                <input type="number" id="price" placeholder="Estimate Price (Rp)" class="w-full p-5 input-wedding text-xs">
                <input type="text" id="name" placeholder="Item name..." class="md:col-span-2 w-full p-5 input-wedding text-xs">
                <input type="text" id="img" placeholder="Inspiration Link (Pinterest)" class="md:col-span-2 w-full p-5 input-wedding text-xs">
            </div>
            <button onclick="addItem()" id="btnSimpan" class="w-full mt-8 pearl-btn font-bold py-5 rounded-2xl text-xs tracking-[0.2em] uppercase">
                Save to Love List ✨
            </button>
        </div>

        <div id="content" class="space-y-32 pb-40"></div>
    </div>

    <script>
        const CLIENT_ID = "GANTI_DENGAN_CLIENT_ID_KAMU.apps.googleusercontent.com"; 

        function initPearlSparkles() {
            const container = document.getElementById('pearl-layer');
            for (let i = 0; i < 45; i++) {
                const s = document.createElement('div');
                s.className = 'pearl-sparkle';
                const size = Math.random() * 5 + 2 + 'px';
                s.style.width = size;
                s.style.height = size;
                s.style.top = Math.random() * 100 + '%';
                s.style.left = Math.random() * 100 + '%';
                s.style.animationDelay = Math.random() * 5 + 's';
                s.style.animationDuration = Math.random() * 3 + 4 + 's';
                container.appendChild(s);
            }
        }

        let userEmail = localStorage.getItem('user_email');
        let myName = localStorage.getItem('my_name');
        let partnerName = localStorage.getItem('partner_name');

        window.onload = () => {
            initPearlSparkles();
            if(!userEmail) { document.getElementById('loginSection').classList.remove('hidden'); }
            else if(!myName || !partnerName) { document.getElementById('setupName').classList.remove('hidden'); }
            else { showMainApp(); }
            renderGoogleButton();
        };

        function renderGoogleButton() {
            google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById("googleBtn"), { theme: "outline", size: "large", shape: "pill" });
        }

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('user_email', payload.email);
            document.getElementById('loginSection').classList.add('hidden-fade');
            setTimeout(() => {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('setupName').classList.remove('hidden');
            }, 1000);
        }

        function saveProfile() {
            const m = document.getElementById('inputUser').value;
            const p = document.getElementById('inputPartner').value;
            if(m && p) {
                localStorage.setItem('my_name', m);
                localStorage.setItem('partner_name', p);
                document.getElementById('setupName').classList.add('hidden-fade');
                setTimeout(() => {
                    document.getElementById('setupName').classList.add('hidden');
                    showMainApp();
                }, 1000);
            }
        }

        function showMainApp() {
            const app = document.getElementById('app');
            app.classList.remove('hidden');
            setTimeout(() => app.classList.remove('hidden-fade'), 50);
            document.getElementById('titleDisplay').innerText = `${localStorage.getItem('my_name')} & ${localStorage.getItem('partner_name')}`;
            loadData();
        }

        async function loadData() {
            const res = await fetch(`/api/manage?email=${localStorage.getItem('user_email')}`);
            const data = await res.json();
            render(Array.isArray(data) ? data : []);
        }

        async function addItem() {
            const btn = document.getElementById('btnSimpan');
            btn.innerText = "Curating your list...";
            const body = {
                user_email: localStorage.getItem('user_email'),
                partner_name: `${localStorage.getItem('my_name')} & ${localStorage.getItem('partner_name')}`,
                category: document.getElementById('cat').value,
                item_name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value) || 0,
                img_url: document.getElementById('img').value || ''
            };
            await fetch('/api/manage', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            loadData();
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            document.getElementById('img').value = '';
            btn.innerText = "Save to Love List ✨";
        }

        function render(data) {
            const container = document.getElementById('content');
            const totalDisplay = document.getElementById('totalPrice');
            container.innerHTML = '';
            const total = data.reduce((s, i) => s + i.price, 0);
            totalDisplay.innerText = `Rp${total.toLocaleString('id-ID')}`;
            const grouped = data.reduce((r, a) => { r[a.category] = [...r[a.category] || [], a]; return r; }, {});

            for (const cat in grouped) {
                let html = `
                    <div class="fade-in-up">
                        <div class="flex items-center gap-8 mb-12">
                            <h3 class="elegant italic text-2xl text-gray-600">${cat}</h3>
                            <div class="h-[1px] flex-grow bg-[#e7d8d2]"></div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12">`;
                
                grouped[cat].forEach(i => {
                    html += `
                        <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm hover:shadow-xl transition-all duration-700 group border-[8px] border-white relative">
                            <div class="relative aspect-[4/5] overflow-hidden">
                                <button onclick="deleteItem(${i.id})" class="absolute top-5 right-5 bg-white/90 text-[#d4b9af] w-10 h-10 rounded-full z-20 opacity-0 group-hover:opacity-100 transition-all font-bold">✕</button>
                                <img src="${i.img_url || 'https://via.placeholder.com/600x800?text=Pearl+Aesthetic'}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000">
                            </div>
                            <div class="p-8">
                                <p class="text-[9px] text-[#d4b9af] uppercase tracking-[0.3em] mb-2">${cat}</p>
                                <p class="elegant text-lg text-gray-800 mb-3">${i.item_name}</p>
                                <p class="text-[#d4b9af] font-bold text-lg tracking-tight italic">Rp${i.price.toLocaleString('id-ID')}</p>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            }
        }

        async function deleteItem(id) { if(confirm("Hapus item ini?")) { await fetch(`/api/manage?id=${id}`, { method: 'DELETE' }); loadData(); } }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
