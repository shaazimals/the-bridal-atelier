<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VowsDB | The Wedding Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f7 50%, #f0f4ff 100%); 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        .charm { font-family: 'Charm', cursive; }
        .elegant { font-family: 'Playfair Display', serif; }
        
        /* Efek Visual (Petals & Sparkles) */
        #visual-layer { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
        .sparkle { position: absolute; background: white; border-radius: 50%; box-shadow: 0 0 10px 2px white; animation: sparkleAnim 4s infinite; opacity: 0; }
        .petal { position: absolute; background: #ffd1dc; border-radius: 150% 0 150% 0; animation: fall 10s linear infinite; opacity: 0.3; }

        @keyframes sparkleAnim { 0%, 100% { transform: scale(0); opacity: 0; } 50% { transform: scale(1); opacity: 0.6; } }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Glassmorphism */
        .glass-card { 
            background: rgba(255, 255, 255, 0.55); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.7); 
            border-radius: 40px; 
        }

        /* Transisi Halaman */
        .page-fade { transition: all 0.8s ease-in-out; }
        .hidden-fade { opacity: 0; pointer-events: none; transform: scale(1.05); }
        .fade-in-up { animation: fadeInUp 1.2s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .input-wedding { 
            background: rgba(255, 255, 255, 0.8); 
            border: 1px solid #ffe4e6; 
            border-radius: 20px;
            transition: all 0.4s;
        }
        .input-wedding:focus { border-color: #fda4af; box-shadow: 0 0 20px rgba(253, 164, 175, 0.2); outline: none; }
    </style>
</head>
<body>

    <div id="visual-layer"></div>

    <div id="loginSection" class="fixed inset-0 z-[100] flex items-center justify-center p-6 page-fade hidden">
        <div class="max-w-sm w-full text-center space-y-10">
            <div class="relative inline-block animate-bounce shadow-pink-200">
                <h2 class="charm text-8xl text-pink-400 drop-shadow-md">VowsDB</h2>
                <span class="absolute -top-4 -right-6 text-2xl">✨</span>
            </div>
            <div class="p-12 glass-card shadow-2xl">
                <p class="elegant italic text-gray-400 mb-10 uppercase tracking-[0.3em] text-[10px]">Your Private Wedding Catalog</p>
                <div id="googleBtn" class="flex justify-center"></div>
            </div>
        </div>
    </div>

    <div id="setupName" class="fixed inset-0 z-[110] flex items-center justify-center p-6 page-fade hidden">
        <div class="max-w-md w-full space-y-10 text-center fade-in-up">
            <div class="space-y-2">
                <h3 class="charm text-6xl text-pink-500">The Happy Couple</h3>
                <p class="elegant italic text-gray-400 text-sm">Fill in your names to begin</p>
            </div>
            <div class="p-10 glass-card shadow-2xl space-y-6">
                <input type="text" id="inputUser" placeholder="Nama Mempelai Wanita" class="w-full p-5 input-wedding text-sm text-center">
                <div class="charm text-4xl text-pink-200">and</div>
                <input type="text" id="inputPartner" placeholder="Nama Mempelai Pria" class="w-full p-5 input-wedding text-sm text-center">
                <button onclick="saveProfile()" class="w-full bg-gradient-to-r from-pink-400 to-pink-500 text-white font-bold py-5 rounded-2xl shadow-lg shadow-pink-200 active:scale-95 transition-all">
                    Tulis Janji Kita ✨
                </button>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-3xl mx-auto px-6 pt-20 relative z-10 page-fade hidden-fade hidden">
        <header class="flex flex-col md:flex-row justify-between items-center mb-20 gap-8">
            <div class="text-center md:text-left">
                <p class="elegant italic text-pink-400 text-lg">In Harmony & Love</p>
                <h1 id="titleDisplay" class="charm text-7xl text-gray-800 mt-2">Siti & Maas</h1>
                <button onclick="logout()" class="text-[10px] text-gray-400 hover:text-pink-500 tracking-[0.4em] uppercase mt-4 block mx-auto md:mx-0">Sign Out —</button>
            </div>
            <div class="bg-white/80 p-8 rounded-[3rem] shadow-xl border border-white min-w-[260px] text-center">
                <p class="text-[10px] text-blue-300 font-bold uppercase tracking-[0.3em] mb-2">Total Budget</p>
                <p id="totalPrice" class="text-4xl font-bold text-gray-800 tracking-tighter leading-none">Rp0</p>
            </div>
        </header>

        <div class="glass-card p-10 mb-24 shadow-2xl border-white">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <select id="cat" class="w-full p-5 input-wedding text-xs font-bold appearance-none">
                    <option>Seserahan Skincare</option><option>Body Care Set</option><option>Fashion & Jewelry</option><option>Perlengkapan Ibadah</option><option>Lainnya</option>
                </select>
                <input type="number" id="price" placeholder="Estimasi Harga (Rp)" class="w-full p-5 input-wedding text-xs">
                <input type="text" id="name" placeholder="Nama Barang Impian..." class="md:col-span-2 w-full p-5 input-wedding text-xs">
                <input type="text" id="img" placeholder="Link Gambar (Pinterest)" class="md:col-span-2 w-full p-5 input-wedding text-xs">
            </div>
            <button onclick="addItem()" id="btnSimpan" class="w-full mt-8 bg-gradient-to-r from-pink-400 to-pink-500 text-white font-bold py-5 rounded-2xl shadow-xl shadow-pink-100 hover:scale-[1.02] transition-all">
                Add to Love List ✨
            </button>
        </div>

        <div id="content" class="space-y-32 pb-32"></div>
    </div>

    <script>
        const CLIENT_ID = "933906511221-0moeldahtahrn7sjp2ju1np8k8hufs6c.apps.googleusercontent.com"; 

        // Efek Sparkle & Kelopak Bunga (Berjalan Terus)
        function initVisuals() {
            const container = document.getElementById('visual-layer');
            for (let i = 0; i < 35; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.top = Math.random() * 100 + '%';
                s.style.left = Math.random() * 100 + '%';
                s.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(s);
            }
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.className = 'petal';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 10 + 's';
                p.style.animationDuration = Math.random() * 5 + 7 + 's';
                container.appendChild(p);
            }
        }

        let userEmail = localStorage.getItem('user_email');
        let myName = localStorage.getItem('my_name');
        let partnerName = localStorage.getItem('partner_name');

        window.onload = () => {
            initVisuals();
            if(!userEmail) {
                document.getElementById('loginSection').classList.remove('hidden');
            } else if(!myName || !partnerName) {
                document.getElementById('setupName').classList.remove('hidden');
            } else {
                showMainApp();
            }
            renderGoogleButton();
        };

        function renderGoogleButton() {
            google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById("googleBtn"), { theme: "outline", size: "large", shape: "pill" });
        }

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('user_email', payload.email);
            document.getElementById('loginSection').classList.add('hidden-fade');
            setTimeout(() => {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('setupName').classList.remove('hidden');
            }, 800);
        }

        function saveProfile() {
            const m = document.getElementById('inputUser').value;
            const p = document.getElementById('inputPartner').value;
            if(m && p) {
                localStorage.setItem('my_name', m);
                localStorage.setItem('partner_name', p);
                document.getElementById('setupName').classList.add('hidden-fade');
                setTimeout(() => {
                    document.getElementById('setupName').classList.add('hidden');
                    showMainApp();
                }, 800);
            }
        }

        function showMainApp() {
            const app = document.getElementById('app');
            app.classList.remove('hidden');
            setTimeout(() => app.classList.remove('hidden-fade'), 50);
            document.getElementById('titleDisplay').innerText = `${localStorage.getItem('my_name')} & ${localStorage.getItem('partner_name')}`;
            loadData();
        }

        async function loadData() {
            const res = await fetch(`/api/manage?email=${localStorage.getItem('user_email')}`);
            const data = await res.json();
            render(Array.isArray(data) ? data : []);
        }

        async function addItem() {
            const btn = document.getElementById('btnSimpan');
            btn.innerText = "Blessing your data...";
            const body = {
                user_email: localStorage.getItem('user_email'),
                partner_name: `${localStorage.getItem('my_name')} & ${localStorage.getItem('partner_name')}`,
                category: document.getElementById('cat').value,
                item_name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value) || 0,
                img_url: document.getElementById('img').value || ''
            };
            await fetch('/api/manage', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            loadData();
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            document.getElementById('img').value = '';
            btn.innerText = "Add to Love List ✨";
        }

        function render(data) {
            const container = document.getElementById('content');
            const totalDisplay = document.getElementById('totalPrice');
            container.innerHTML = '';
            const total = data.reduce((s, i) => s + i.price, 0);
            totalDisplay.innerText = `Rp${total.toLocaleString('id-ID')}`;
            const grouped = data.reduce((r, a) => { r[a.category] = [...r[a.category] || [], a]; return r; }, {});

            for (const cat in grouped) {
                let html = `
                    <div class="fade-in-up">
                        <div class="flex items-center gap-8 mb-12">
                            <h3 class="elegant italic text-3xl text-gray-700">${cat}</h3>
                            <div class="h-[1px] flex-grow bg-gradient-to-r from-pink-200 to-transparent"></div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12">`;
                
                grouped[cat].forEach(i => {
                    html += `
                        <div class="bg-white/90 rounded-[2.5rem] overflow-hidden shadow-xl hover:shadow-2xl transition-all duration-700 group border-[6px] border-white relative">
                            <div class="relative aspect-[4/5] overflow-hidden">
                                <button onclick="deleteItem(${i.id})" class="absolute top-5 right-5 bg-white/90 text-pink-400 w-10 h-10 rounded-full z-20 opacity-0 group-hover:opacity-100 transition-all font-bold">✕</button>
                                <img src="${i.img_url || 'https://via.placeholder.com/600x800?text=Beauty'}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000">
                                <div class="absolute inset-0 bg-gradient-to-t from-pink-50/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            </div>
                            <div class="p-8">
                                <p class="text-[9px] text-pink-300 uppercase tracking-[0.4em] mb-2">${cat}</p>
                                <p class="elegant text-xl text-gray-800 mb-3">${i.item_name}</p>
                                <p class="text-pink-400 font-bold text-lg">Rp${i.price.toLocaleString('id-ID')}</p>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            }
        }

        async function deleteItem(id) { if(confirm("Hapus item ini?")) { await fetch(`/api/manage?id=${id}`, { method: 'DELETE' }); loadData(); } }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
