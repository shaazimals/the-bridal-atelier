<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VowsDB | Rose Gold Luxe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at center, #fffafa 0%, #f9f0f0 100%);
            min-height: 100vh;
        }
        .charm { font-family: 'Charm', cursive; }
        .elegant { font-family: 'Playfair Display', serif; }

        /* === ROSE GOLD SPARKLE DI TULISAN === */
        .sparkle-container { position: relative; display: inline-block; }
        .glow-dot {
            position: absolute;
            background: #e5b3b3;
            border-radius: 50%;
            filter: blur(1px);
            box-shadow: 0 0 15px 5px rgba(229, 179, 179, 0.6);
            pointer-events: none;
            z-index: 20;
        }
        .glow-dot::before, .glow-dot::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            background: white; transform: translate(-50%, -50%);
        }
        .glow-dot::before { width: 1px; height: 150%; }
        .glow-dot::after { width: 150%; height: 1px; }

        /* Frosted Glass */
        .frosted-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(40px);
            border: 1.5px solid rgba(229, 179, 179, 0.3);
            border-radius: 60px;
            box-shadow: 0 40px 100px rgba(229, 179, 179, 0.1);
        }

        /* === CUSTOM GOOGLE BUTTON (ROSE GOLD THEME) === */
        .custom-google-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f2d1d1 0%, #e5b3b3 100%);
            padding: 2px; /* Garis tepi */
            border-radius: 9999px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(229, 179, 179, 0.4);
        }
        .custom-google-wrapper:hover { transform: scale(1.05); }
        
        /* Tombol Google Asli disembunyikan tapi tetap bisa diklik */
        #googleBtn {
            position: absolute;
            inset: 0;
            opacity: 0.01; /* Hampir transparan */
            z-index: 10;
            cursor: pointer;
        }
        
        .fake-btn {
            background: white;
            padding: 12px 28px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 14px;
            color: #7a5c5c;
        }

        .page-fade { transition: all 1s ease-in-out; }
        .hidden-fade { opacity: 0; transform: translateY(20px); pointer-events: none; }
    </style>
</head>
<body class="text-[#7a5c5c]">

    <div id="loginSection" class="fixed inset-0 z-[100] flex items-center justify-center p-6 page-fade">
        <div class="max-w-4xl w-full text-center">
            <p class="elegant italic text-[#d69e9e] text-xl mb-6 opacity-80 tracking-widest">In Harmony & Love</p>
            
            <div class="frosted-panel p-20 md:p-32 relative">
                <div class="sparkle-container mb-8">
                    <div class="glow-dot w-3 h-3 -top-6 -left-10"></div>
                    <div class="glow-dot w-2 h-2 top-0 right-[-30px]"></div>
                    <div class="glow-dot w-4 h-4 bottom-[-10px] left-10"></div>
                    
                    <h2 class="charm text-8xl md:text-[10rem] text-[#d69e9e] leading-none">VowsDB</h2>
                </div>

                <p class="elegant italic text-[10px] tracking-[0.5em] uppercase text-[#b4a096] mb-16">
                    Curating your precious memories
                </p>

                <div class="custom-google-wrapper">
                    <div id="googleBtn"></div> <div class="fake-btn">
                        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20" alt="G">
                        Login dengan Google ✨
                    </div>
                </div>
                
                <p class="text-[10px] mt-24 opacity-40 tracking-[0.3em] uppercase">By Haazima</p>
            </div>
        </div>
    </div>

    <div id="setupName" class="fixed inset-0 z-[110] flex items-center justify-center p-6 page-fade hidden hidden-fade">
        </div>

    <script>
        const CLIENT_ID = "GANTI_PAKE_ID_KAMU_SITI.apps.googleusercontent.com"; 

        window.onload = () => {
            google.accounts.id.initialize({ 
                client_id: CLIENT_ID, 
                callback: handleCredentialResponse 
            });
            // Gunakan renderButton tapi ukurannya kita paskan dengan fake-btn
            google.accounts.id.renderButton(document.getElementById("googleBtn"), { 
                theme: "outline", size: "large", width: 250 
            });
        };

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('user_email', payload.email);
            document.getElementById('loginSection').classList.add('hidden-fade');
            // Lanjut ke logika setup atau dashboard kamu...
            location.reload(); 
        }
    </script>
</body>
</html>
