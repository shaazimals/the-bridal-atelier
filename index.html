<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VowsDB | Fullstack Wedding Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdf2f8; }
        .romantic { font-family: 'Dancing Script', cursive; }
        .shopee-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-gray-800">

    <div id="welcome" class="fixed inset-0 z-[100] bg-gradient-to-br from-pink-200 to-blue-200 flex items-center justify-center p-6 hidden">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <h2 class="romantic text-5xl text-pink-500 mb-2">VowsDB</h2>
            <p class="text-[10px] text-gray-400 mb-8 uppercase tracking-[0.3em]">By Haazima</p>
            <p class="text-sm text-gray-500 mb-8">Simpan daftar seserahanmu dengan aman. Login untuk memulai.</p>
            <div id="googleBtn" class="flex justify-center"></div>
        </div>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen">
        <header class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg p-4 border-b border-pink-100 flex justify-between items-center">
            <div>
                <h1 id="titleDisplay" class="romantic text-2xl text-pink-500">VowsDB</h1>
                <button onclick="logout()" class="text-[9px] text-gray-400 underline uppercase tracking-tighter">Logout</button>
            </div>
            <div class="text-right">
                <p id="totalPrice" class="text-xl font-bold text-gray-800 leading-none">Rp0</p>
                <p class="text-[9px] text-blue-400 font-bold uppercase tracking-widest mt-1">Total Budget</p>
            </div>
        </header>

        <div class="p-5">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-pink-50 space-y-3 mb-10">
                <div class="grid grid-cols-2 gap-2">
                    <select id="cat" class="bg-gray-50 p-3 rounded-xl border-none text-xs font-bold focus:ring-2 focus:ring-pink-200">
                        <option>Skincare</option><option>Body Care</option><option>Fashion</option><option>Ibadah</option><option>Lainnya</option>
                    </select>
                    <input type="number" id="price" placeholder="Harga (Rp)" class="bg-gray-50 p-3 rounded-xl border-none text-xs focus:ring-2 focus:ring-pink-200">
                </div>
                <input type="text" id="name" placeholder="Nama Barang" class="w-full bg-gray-50 p-3 rounded-xl border-none text-xs focus:ring-2 focus:ring-pink-200">
                <input type="text" id="img" placeholder="Link Alamat Gambar (Copy Image Address)" class="w-full bg-gray-50 p-3 rounded-xl border-none text-xs focus:ring-2 focus:ring-pink-200">
                <button onclick="addItem()" class="w-full bg-pink-500 text-white font-bold py-4 rounded-2xl text-sm shadow-lg shadow-pink-200 active:scale-95 transition-all">Tambahkan ke List ✨</button>
            </div>

            <div id="content" class="space-y-12"></div>
        </div>

        <footer class="text-center py-10 opacity-20 text-[9px] uppercase tracking-[0.5em]">
            Developed by Haazima
        </footer>
    </div>

    <script>
        const CLIENT_ID = "MASUKKAN_CLIENT_ID_KAMU.apps.googleusercontent.com"; // <-- GANTI INI!
        let userEmail = localStorage.getItem('user_email');
        let userName = localStorage.getItem('vows_partner');

        window.onload = () => {
            if(!userEmail) {
                document.getElementById('welcome').classList.remove('hidden');
                renderGoogleButton();
            } else {
                document.getElementById('titleDisplay').innerText = `For ${userName}`;
                loadData();
            }
        };

        function renderGoogleButton() {
            google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById("googleBtn"), { theme: "outline", size: "large", shape: "pill" });
        }

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('user_email', payload.email);
            localStorage.setItem('vows_partner', payload.name);
            location.reload();
        }

        async function loadData() {
            const res = await fetch(`/api/manage?email=${userEmail}`);
            const data = await res.json();
            render(data);
        }

        async function addItem() {
            const body = {
                user_email: userEmail,
                partner_name: userName,
                category: document.getElementById('cat').value,
                item_name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value) || 0,
                img_url: document.getElementById('img').value
            };
            await fetch('/api/manage', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            location.reload();
        }

        async function deleteItem(id) {
            if(confirm("Hapus barang ini?")) {
                await fetch(`/api/manage?id=${id}`, { method: 'DELETE' });
                loadData();
            }
        }

        function render(data) {
            const container = document.getElementById('content');
            const totalDisplay = document.getElementById('totalPrice');
            container.innerHTML = '';
            
            const total = data.reduce((s, i) => s + i.price, 0);
            totalDisplay.innerText = `Rp${total.toLocaleString('id-ID')}`;

            const grouped = data.reduce((r, a) => {
                r[a.category] = [...r[a.category] || [], a];
                return r;
            }, {});

            for (const cat in grouped) {
                let html = `<div><h3 class="font-bold text-[10px] text-blue-400 mb-4 border-b border-blue-50 pb-1 uppercase tracking-[0.2em]">${cat}</h3><div class="grid grid-cols-2 gap-4">`;
                grouped[cat].forEach(i => {
                    html += `
                        <div class="shopee-card relative group">
                            <button onclick="deleteItem(${i.id})" class="absolute top-2 right-2 bg-white/80 backdrop-blur-sm text-pink-500 w-6 h-6 rounded-full text-[10px] z-10 shadow-sm">✕</button>
                            <img src="${i.img_url}" class="w-full aspect-square object-cover" onerror="this.src='https://via.placeholder.com/200?text=Produk'">
                            <div class="p-3">
                                <p class="text-[11px] text-gray-500 line-clamp-2 h-8 leading-tight mb-2">${i.item_name}</p>
                                <p class="text-pink-500 font-bold text-sm">Rp${i.price.toLocaleString('id-ID')}</p>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
