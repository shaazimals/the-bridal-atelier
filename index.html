<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bridal Atelier by Haazima</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #fffafa; color: #7a5c5c; margin: 0; }
        .charm { font-family: 'Charm', cursive; }
        .elegant { font-family: 'Playfair Display', serif; }
        .glow-dot { position: absolute; background: #e5b3b3; border-radius: 50%; filter: blur(1px); box-shadow: 0 0 15px 5px rgba(229, 179, 179, 0.6); animation: sparkle 4s infinite ease-in-out; }
        @keyframes sparkle { 0%, 100% { opacity: 0.5; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }
        .frosted { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(229, 179, 179, 0.3); border-radius: 30px; }
        #googleBtn { position: absolute; inset: 0; opacity: 0.01; z-index: 50; }
    </style>
</head>
<body>

    <div id="loginSection" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="frosted p-10 text-center w-full max-w-lg shadow-2xl">
            <div class="relative inline-block mb-8">
                <div class="glow-dot w-3 h-3 -top-4 -left-4"></div>
                <h2 class="charm text-5xl text-[#d69e9e]">The Bridal Atelier</h2>
            </div>
            <div class="relative bg-white px-8 py-4 rounded-full shadow-md border inline-flex items-center gap-2">
                <div id="googleBtn"></div>
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18">
                <span class="font-bold text-xs">Login with Google</span>
            </div>
            <p class="mt-10 text-[9px] uppercase tracking-widest opacity-50 italic">Developed by Haazima © 2026</p>
        </div>
    </div>

    <div id="app" class="max-w-5xl mx-auto px-4 pt-10 hidden pb-20">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="text-center md:text-left">
                <h1 id="titleDisplay" class="charm text-6xl text-[#d69e9e]">The Couple</h1>
                <button onclick="logout()" class="text-[9px] uppercase tracking-widest mt-4 opacity-40 font-bold underline">Logout</button>
            </div>
            <div class="bg-white/80 p-6 rounded-3xl border border-pink-100 text-center shadow-sm min-w-[200px]">
                <p class="text-[9px] font-bold text-[#d69e9e]">TOTAL INVESTMENT</p>
                <p id="totalPrice" class="text-3xl font-bold">Rp0</p>
            </div>
        </header>

        <div class="frosted p-6 mb-16 shadow-lg">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select id="cat" class="p-4 rounded-xl bg-white border border-pink-50 text-xs">
                    <option>✨ The Bridal Attire</option><option>💄 Grace & Beauty</option><option>💍 Sacred Jewelry</option><option>🕊️ The Ceremony Needs</option>
                </select>
                <input type="number" id="price" placeholder="Price (Rp)" class="p-4 rounded-xl bg-white border border-pink-50 text-xs">
                <input type="text" id="name" placeholder="Item Name" class="md:col-span-2 p-4 rounded-xl bg-white border border-pink-50 text-xs">
                <div class="md:col-span-2">
                    <label class="text-[9px] font-bold mb-2 block">IMAGE UPLOAD (SCREENSHOT)</label>
                    <input type="file" id="fileImg" accept="image/*" class="w-full p-2 bg-white rounded-xl border border-dashed border-pink-200 text-xs">
                </div>
                <input type="text" id="shopeeLink" placeholder="Paste Shopee Link Here" class="md:col-span-2 p-4 rounded-xl bg-white border border-pink-50 text-xs">
            </div>
            <button onclick="addItem()" id="btnSimpan" class="w-full mt-6 bg-gradient-to-r from-pink-200 to-[#e5b3b3] text-white font-bold py-5 rounded-full text-xs shadow-lg uppercase">Add to My List ✨</button>
        </div>

        <div id="content" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
        <p class="text-center mt-20 text-[9px] opacity-40 uppercase tracking-widest italic">Developed with Love by Haazima © 2026</p>
    </div>

    <script>
        const CLIENT_ID = "933906511221-0moeldahtahrn7sjp2ju1np8k8hufs6c.apps.googleusercontent.com"; 

        window.onload = () => {
            google.accounts.id.initialize({ client_id: CLIENT_ID, callback: res => {
                const p = JSON.parse(atob(res.credential.split('.')[1]));
                localStorage.setItem('user_email', p.email);
                location.reload();
            }});
            google.accounts.id.renderButton(document.getElementById("googleBtn"), { theme: "outline", size: "large" });
            
            if(localStorage.getItem('user_email')) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('titleDisplay').innerText = "Our Eternal Story";
                loadData();
            }
        };

        function logout() { localStorage.clear(); location.reload(); }

        async function addItem() {
            const btn = document.getElementById('btnSimpan'); btn.innerText = "Saving...";
            const file = document.getElementById('fileImg').files[0];
            let img = 'https://via.placeholder.com/600x800';
            if(file) img = await new Promise(r => { const f = new FileReader(); f.readAsDataURL(file); f.onload = () => r(f.result); });

            const body = {
                user_email: localStorage.getItem('user_email'),
                partner_name: "The Couple",
                category: document.getElementById('cat').value,
                item_name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value) || 0,
                img_url: img,
                product_link: document.getElementById('shopeeLink').value.trim()
            };
            await fetch('/api/manage', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            loadData(); btn.innerText = "Add to My List ✨";
            document.getElementById('name').value = ''; document.getElementById('price').value = ''; 
            document.getElementById('fileImg').value = ''; document.getElementById('shopeeLink').value = '';
        }

        async function loadData() {
            const res = await fetch('/api/manage?email=' + localStorage.getItem('user_email'));
            const data = await res.json();
            render(data);
        }

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            const total = Array.isArray(data) ? data.reduce((s,i)=>s+i.price, 0) : 0;
            document.getElementById('totalPrice').innerText = "Rp" + total.toLocaleString('id-ID');
            
            if(Array.isArray(data)) {
                data.forEach(i => {
                    // LINK DIBUAT SIMPLE: Langsung pakai tag <a> murni
                    const link = (i.product_link && i.product_link.startsWith('http')) ? i.product_link : '#';
                    container.innerHTML += `
                        <div class="bg-white rounded-3xl overflow-hidden shadow-sm border-4 border-white relative">
                            <a href="${link}">
                                <div class="aspect-[4/5] relative">
                                    <img src="${i.img_url}" class="w-full h-full object-cover">
                                    ${link !== '#' ? `<div class="absolute bottom-2 right-2 bg-orange-500 text-white text-[8px] font-bold px-3 py-1 rounded-full shadow-lg">🛒 SHOP</div>` : ''}
                                </div>
                            </a>
                            <div class="p-3">
                                <button onclick="deleteItem(${i.id})" class="absolute top-2 right-2 bg-white/90 text-pink-300 w-6 h-6 rounded-full font-bold text-[10px]">✕</button>
                                <p class="text-[10px] font-bold line-clamp-1">${i.item_name}</p>
                                <p class="text-[#d69e9e] font-bold text-[9px] mt-1 italic">Rp${i.price.toLocaleString('id-ID')}</p>
                            </div>
                        </div>`;
                });
            }
        }

        async function deleteItem(id) { if(confirm("Hapus?")) { await fetch('/api/manage?id=' + id, { method: 'DELETE' }); loadData(); } }
    </script>
</body>
</html>
