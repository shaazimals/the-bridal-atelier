<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bridal Atelier | Haazima</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fffafa; color: #7a5c5c; margin: 0; overflow-x: hidden; }
        .charm { font-family: 'Charm', cursive; }
        .elegant { font-family: 'Playfair Display', serif; }
        
        .page-fade { transition: opacity 1s ease-in-out; opacity: 1; }
        .fade-out { opacity: 0 !important; pointer-events: none; }
        .hidden-node { display: none !important; }

        .sparkle-point {
            position: absolute; background: #e5b3b3; border-radius: 50%;
            filter: blur(1.5px); animation: sparkleAnim 4s infinite ease-in-out;
            pointer-events: none; z-index: 50;
        }
        .sparkle-point::before, .sparkle-point::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            background: white; transform: translate(-50%, -50%);
        }
        .sparkle-point::before { width: 1.5px; height: 200%; }
        .sparkle-point::after { width: 200%; height: 1.5px; }

        @keyframes sparkleAnim {
            0%, 100% { opacity: 0.2; transform: scale(0.7); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .petal {
            position: fixed; background: linear-gradient(to bottom right, #f2d1d1, #e5b3b3);
            border-radius: 150% 0 150% 0; animation: falling 12s infinite linear;
            pointer-events: none; z-index: 40; opacity: 0.5;
        }

        @keyframes falling {
            0% { transform: translate(0, -10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            100% { transform: translate(150px, 110vh) rotate(360deg); opacity: 0; }
        }

        .frosted { 
            background: rgba(255, 255, 255, 0.55); 
            backdrop-filter: blur(30px); 
            border: 2px solid rgba(229, 179, 179, 0.25); 
            border-radius: 50px; 
        }
        #googleBtn { position: absolute; inset: 0; opacity: 0.01; z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

    <div id="globalDecor">
        <div class="petal w-4 h-4" style="left: 5%; animation-delay: 0s;"></div>
        <div class="petal w-3 h-5" style="left: 30%; animation-delay: 3s;"></div>
        <div class="petal w-5 h-3" style="left: 60%; animation-delay: 6s;"></div>
        <div class="sparkle-point w-4 h-4 top-[15%] left-[10%]"></div>
        <div class="sparkle-point w-3 h-3 top-[10%] right-[15%]" style="animation-delay: 1s;"></div>
    </div>

    <div id="loginSection" class="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-[#fffafa] page-fade">
        <div class="w-full max-w-4xl text-center">
            <p class="elegant italic text-[11px] tracking-[0.6em] text-[#d69e9e] mb-3 uppercase">In Harmony & Love</p>
            <p class="text-[9px] tracking-[0.4em] opacity-60 mb-12 uppercase font-bold italic">Developed with Love by Haazima © 2026</p>
            <div class="frosted p-16 md:p-28 relative shadow-2xl border-2 border-white">
                <h2 class="charm text-6xl md:text-[8.5rem] text-[#d69e9e] mb-14">The Bridal Atelier</h2>
                <div class="relative inline-flex bg-white px-12 py-5 rounded-full shadow-lg border border-pink-100 items-center gap-4">
                    <div id="googleBtn"></div>
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="22">
                    <span class="font-bold text-sm text-[#7a5c5c] tracking-widest uppercase">Authenticate Sanctuary ✨</span>
                </div>
            </div>
        </div>
    </div>

    <div id="setupName" class="fixed inset-0 z-[90] flex items-center justify-center p-4 bg-[#fffafa] hidden-node page-fade">
        <div class="w-full max-w-xl text-center">
            <h3 class="charm text-7xl text-[#d69e9e] mb-10 tracking-wide">The Happy Couple</h3>
            <div class="frosted p-12 space-y-8 shadow-xl border-2 border-white">
                <div class="grid grid-cols-1 gap-6">
                    <input type="text" id="herName" placeholder="Her Name" class="w-full p-5 rounded-full bg-white/70 text-center outline-none border border-pink-100">
                    <input type="text" id="himName" placeholder="His Name" class="w-full p-5 rounded-full bg-white/70 text-center outline-none border border-pink-100">
                </div>
                <button onclick="saveProfile()" class="w-full bg-gradient-to-r from-pink-200 to-[#e5b3b3] text-white font-bold py-6 rounded-full text-[10px] uppercase">Register Identity ✨</button>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-7xl mx-auto px-4 pt-20 hidden-node page-fade pb-40">
        <header class="flex flex-col md:flex-row justify-between items-end mb-24 gap-12">
            <div>
                <p id="specialFor" class="elegant italic text-[#d69e9e] text-3xl mb-4">Special for...</p>
                <h1 class="charm text-7xl md:text-[9rem] tracking-wide leading-none">The Bridal Atelier</h1>
                <div class="flex items-center gap-6 mt-10">
                    <button onclick="logout()" class="bg-white/70 px-8 py-3 rounded-full border border-pink-100 text-[10px] uppercase font-bold text-[#d69e9e]">Logout</button>
                    <span class="text-[10px] opacity-40 uppercase font-bold italic">Haazima © 2026</span>
                </div>
            </div>
            <div class="flex flex-col gap-6 w-full md:w-[450px]">
                <div onclick="burstSparkle()" class="cursor-pointer frosted p-10 text-center shadow-lg bg-white/80">
                    <p class="text-[11px] font-bold tracking-[0.5em] mb-5 text-[#d69e9e]">ROAD TO ETERNITY</p>
                    <div class="w-full bg-pink-50 h-3 rounded-full mb-4 overflow-hidden">
                        <div id="progressBar" class="bg-gradient-to-r from-pink-200 to-[#e5b3b3] h-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                    <p id="progressText" class="text-2xl font-bold tracking-tighter">0% Fulfilled</p>
                </div>
                <div class="bg-[#7a5c5c] p-8 rounded-[2.5rem] text-center text-white shadow-2xl">
                    <p class="text-[9px] font-bold tracking-[0.4em] opacity-70 mb-2 uppercase">TOTAL INVESTMENT</p>
                    <p id="totalPrice" class="text-3xl font-bold tracking-tight">Rp0</p>
                </div>
            </div>
        </header>

        <div class="frosted p-12 mb-32 shadow-sm border-2 border-white">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <select id="cat" class="p-5 rounded-2xl bg-white border border-pink-50 text-[10px] font-bold outline-none cursor-pointer">
                    <option>✨ The Bridal Attire</option>
                    <option>💄 Skincare & Beauty</option>
                    <option>💍 Sacred Jewelry</option>
                    <option>🕊️ The Ceremony</option>
                </select>
                <input type="text" id="name" placeholder="Item Name" class="md:col-span-2 p-5 rounded-2xl bg-white border border-pink-50 text-[10px] outline-none">
                <input type="number" id="price" placeholder="Price (Rp)" class="p-5 rounded-2xl bg-white border border-pink-50 text-[10px] outline-none">
                <input type="text" id="img" placeholder="Paste Image Address (URL)" class="md:col-span-2 p-5 rounded-2xl bg-white border border-pink-50 text-[10px] outline-none">
                <input type="text" id="shopeeLink" placeholder="Shopee Link" class="md:col-span-2 p-5 rounded-2xl bg-white border border-pink-50 text-[10px] outline-none">
            </div>
            <button onclick="addItem()" id="btnSimpan" class="w-full mt-10 bg-[#7a5c5c] text-white font-bold py-7 rounded-full text-[11px] uppercase">Enshrine to Katalog ✨</button>
        </div>
        <div id="content" class="space-y-40"></div>
    </div>

    <script>
        const CLIENT_ID = "933906511221-0moeldahtahrn7sjp2ju1np8k8hufs6c.apps.googleusercontent.com"; 
        let globalData = []; // Simpan data di sini agar bisa di-render ulang tanpa reload

        window.onload = () => {
            google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleAuth });
            google.accounts.id.renderButton(document.getElementById("googleBtn"), { theme: "outline", size: "large" });
            const email = localStorage.getItem('user_email');
            if(email) loadData();
        };

        function handleAuth(res) {
            const p = JSON.parse(atob(res.credential.split('.')[1]));
            localStorage.setItem('user_email', p.email);
            location.reload();
        }

        async function loadData() {
            const res = await fetch(`/api/manage?email=${localStorage.getItem('user_email')}`);
            globalData = await res.json();
            
            if (Array.isArray(globalData)) {
                const identity = globalData.find(i => i.category === 'IDENTITY_SYS');
                if (!identity) {
                    document.getElementById('loginSection').classList.add('hidden-node');
                    document.getElementById('setupName').classList.remove('hidden-node');
                } else {
                    localStorage.setItem('my_identity', identity.item_name);
                    document.getElementById('loginSection').classList.add('hidden-node');
                    document.getElementById('app').classList.remove('hidden-node');
                    document.getElementById('specialFor').innerText = "Special for " + identity.item_name;
                    render();
                }
            }
        }

        async function saveProfile() {
            const her = document.getElementById('herName').value;
            const him = document.getElementById('himName').value;
            if(!her || !him) return;
            const fullName = her + " & " + him;
            const body = { user_email: localStorage.getItem('user_email'), partner_name: fullName, category: 'IDENTITY_SYS', item_name: fullName, price: 0, img_url: '', product_link: '' };
            await fetch('/api/manage', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            location.reload();
        }

        // FUNGSI RENDER TANPA RELOAD
        function render() {
            const data = globalData.filter(i => i.category !== 'IDENTITY_SYS');
            const container = document.getElementById('content');
            container.innerHTML = '';
            
            const groups = data.reduce((r, a) => { r[a.category] = [...r[a.category] || [], a]; return r; }, {});
            const checkedItems = JSON.parse(localStorage.getItem('checked_' + localStorage.getItem('user_email')) || "[]");
            const fulfilled = data.filter(i => checkedItems.includes(i.id)).length;
            const percent = data.length > 0 ? Math.round((fulfilled / data.length) * 100) : 0;
            
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').innerText = percent + '% Fulfilled';
            document.getElementById('totalPrice').innerText = "Rp" + data.reduce((s, i) => s + i.price, 0).toLocaleString('id-ID');

            for (const cat in groups) {
                let html = `<div><h3 class="elegant italic text-4xl mb-14 text-[#d69e9e] border-b border-pink-100 pb-5 flex justify-between items-end">${cat} <span class="text-[11px] font-sans font-bold opacity-30 uppercase">${groups[cat].length} items</span></h3><div class="grid grid-cols-2 md:grid-cols-4 gap-10">`;
                groups[cat].forEach(i => {
                    const isChecked = checkedItems.includes(i.id) ? 'checked' : '';
                    html += `<div class="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border-8 border-white relative group transition-all hover:shadow-2xl">
                        <div class="aspect-[4/5] relative overflow-hidden bg-gray-50">
                            <img src="${i.img_url || 'https://via.placeholder.com/400x500'}" class="w-full h-full object-cover group-hover:scale-105 transition-all duration-700">
                            <a href="${i.product_link}" target="_blank" class="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center">
                                <span class="bg-white px-5 py-2 rounded-full text-[9px] font-bold shadow-xl">SHOP ➔</span>
                            </a>
                        </div>
                        <div class="p-6">
                            <div class="flex items-start justify-between gap-3 mb-3">
                                <div class="flex items-center gap-3">
                                    <input type="checkbox" id="check-${i.id}" ${isChecked} onchange="toggleCheck(${i.id})" class="accent-[#e5b3b3] w-5 h-5 cursor-pointer">
                                    <label for="check-${i.id}" class="elegant text-lg md:text-2xl leading-tight line-clamp-1 cursor-pointer">${i.item_name}</label>
                                </div>
                                <button onclick="deleteItem(${i.id})" class="text-pink-100 hover:text-pink-300 font-bold text-sm">✕</button>
                            </div>
                            <p class="text-[#d69e9e] font-bold text-[11px] italic">Rp${i.price.toLocaleString('id-ID')}</p>
                        </div>
                    </div>`;
                });
                container.innerHTML += html + `</div></div>`;
            }
        }

        // CEKLIS TANPA RELOAD
        function toggleCheck(id) {
            let checked = JSON.parse(localStorage.getItem('checked_' + localStorage.getItem('user_email')) || "[]");
            if (checked.includes(id)) checked = checked.filter(x => x !== id);
            else checked.push(id);
            localStorage.setItem('checked_' + localStorage.getItem('user_email'), JSON.stringify(checked));
            render(); // Update UI saja tanpa reload halaman
        }

        // TAMBAH TANPA RELOAD
        async function addItem() {
            const btn = document.getElementById('btnSimpan');
            btn.innerText = "Enshrining...";
            const body = { user_email: localStorage.getItem('user_email'), partner_name: localStorage.getItem('my_identity'), category: document.getElementById('cat').value, item_name: document.getElementById('name').value, price: parseInt(document.getElementById('price').value) || 0, img_url: document.getElementById('img').value, product_link: document.getElementById('shopeeLink').value.trim() };
            const res = await fetch('/api/manage', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            
            if(res.ok) {
                await loadData(); // Ambil data terbaru dari server
                document.getElementById('name').value = ''; document.getElementById('price').value = ''; document.getElementById('img').value = ''; document.getElementById('shopeeLink').value = '';
                btn.innerText = "Enshrine to Katalog ✨";
            }
        }

        // HAPUS TANPA RELOAD
        async function deleteItem(id) {
            if(confirm("Hapus item ini dari impianmu? ❤️")) {
                await fetch(`/api/manage?id=${id}`, { method: 'DELETE' });
                globalData = globalData.filter(i => i.id !== id); // Hapus dari memori lokal
                render(); // Update UI
            }
        }

        function burstSparkle() { confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 }, colors: ['#e5b3b3', '#f2d1d1', '#ffffff'] }); }
        function logout() { localStorage.removeItem('user_email'); location.reload(); }
    </script>
</body>
</html>
