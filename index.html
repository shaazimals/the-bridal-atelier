<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bridal Atelier by Haazima</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fffafa; color: #7a5c5c; margin: 0; overflow-x: hidden; }
        .charm { font-family: 'Charm', cursive; }
        .elegant { font-family: 'Playfair Display', serif; }
        
        .sparkle {
            position: absolute; background: #e5b3b3; border-radius: 50%;
            filter: blur(1px); animation: blink 4s infinite ease-in-out;
            pointer-events: none; z-index: 10;
        }
        .sparkle::before, .sparkle::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            background: white; transform: translate(-50%, -50%);
        }
        .sparkle::before { width: 1px; height: 180%; }
        .sparkle::after { width: 180%; height: 1px; }
        @keyframes blink { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

        .frosted { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(20px); border: 1.5px solid rgba(229, 179, 179, 0.2); border-radius: 40px; }
        #googleBtn { position: absolute; inset: 0; opacity: 0.01; z-index: 60; cursor: pointer; }
        .hidden-node { display: none !important; }
        
        input:checked + label { text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="loginSection" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-[#fffafa]">
        <div class="sparkle w-3 h-3 top-[15%] left-[10%]"></div>
        <div class="sparkle w-2 h-2 top-[10%] right-[15%]" style="animation-delay: 1s;"></div>
        <div class="sparkle w-4 h-4 bottom-[20%] left-[30%]" style="animation-delay: 2s;"></div>
        
        <div class="w-full max-w-2xl text-center">
            <p class="elegant italic text-[11px] tracking-[0.5em] text-[#d69e9e] mb-2 uppercase">In Harmony & Love</p>
            <p class="text-[9px] tracking-[0.3em] opacity-50 mb-10 uppercase font-bold italic">Developed with Love by Haazima © 2026</p>
            
            <div class="frosted p-14 md:p-24 relative shadow-2xl overflow-hidden">
                <h2 class="charm text-6xl md:text-[7rem] text-[#d69e9e] mb-12">The Bridal Atelier</h2>
                <div class="relative inline-flex bg-white px-10 py-5 rounded-full shadow-lg border border-pink-100 items-center gap-4 hover:scale-105 transition-all">
                    <div id="googleBtn"></div>
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20">
                    <span class="font-bold text-sm text-[#7a5c5c]">Login With Google</span>
                </div>
            </div>
        </div>
    </div>

    <div id="setupName" class="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-[#fffafa] hidden-node">
        <div class="w-full max-w-md text-center">
            <h3 class="charm text-5xl text-[#d69e9e] mb-8 tracking-wide">The Happy Couple</h3>
            <div class="frosted p-12 space-y-6 shadow-xl border-2 border-pink-50">
                <p class="elegant italic text-xs mb-4">Identity of the Devoted</p>
                <input type="text" id="coupleNames" placeholder="Siti & Maas" class="w-full p-5 rounded-2xl bg-white/70 text-center outline-none border border-pink-100 focus:ring-2 focus:ring-pink-200">
                <button onclick="saveProfile()" class="w-full bg-gradient-to-r from-pink-200 to-[#e5b3b3] text-white font-bold py-5 rounded-full text-[10px] tracking-widest shadow-xl uppercase">Register Identity ✨</button>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-6xl mx-auto px-4 pt-16 hidden-node pb-40">
        <header class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
            <div>
                <p id="specialFor" class="elegant italic text-[#d69e9e] text-xl mb-2">Special for...</p>
                <h1 class="charm text-6xl md:text-8xl tracking-wide">The Bridal Atelier</h1>
                <div class="flex items-center gap-4 mt-8">
                    <button onclick="logout()" class="bg-white/60 px-6 py-2 rounded-full border border-pink-100 text-[9px] uppercase font-bold tracking-widest text-[#d69e9e]">Logout</button>
                    <span class="text-[9px] opacity-40 uppercase font-bold italic">Haazima © 2026</span>
                </div>
            </div>

            <div onclick="burstSparkle()" class="cursor-pointer bg-white/80 p-10 rounded-[3rem] border-2 border-pink-50 text-center shadow-md w-full md:w-80 group hover:border-[#e5b3b3] transition-all">
                <p class="text-[10px] font-bold tracking-[0.4em] mb-4 text-[#d69e9e]">ROAD TO ETERNITY</p>
                <div class="w-full bg-pink-50 h-3 rounded-full mb-4 overflow-hidden">
                    <div id="progressBar" class="bg-gradient-to-r from-pink-200 to-[#e5b3b3] h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p id="progressText" class="text-2xl font-bold tracking-tighter">0% Fulfilled</p>
                <p class="text-[8px] mt-2 opacity-0 group-hover:opacity-100 transition-opacity italic">Click to celebrate ✨</p>
            </div>
        </header>

        <div class="frosted p-10 mb-24 shadow-sm border-2 border-white">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <select id="cat" class="p-5 rounded-2xl bg-white border border-pink-50 text-[10px] font-bold outline-none">
                    <option>✨ The Bridal Attire</option><option>💄 Skincare & Beauty</option><option>💍 Sacred Jewelry</option><option>🕊️ The Ceremony</option><option>🌙 After the Vows</option>
                </select>
                <input type="text" id="name" placeholder="Item Name" class="md:col-span-2 p-5 rounded-2xl bg-white border border-pink-50 text-[10px] outline-none">
                <input type="number" id="price" placeholder="Price (Rp)" class="p-5 rounded-2xl bg-white border border-pink-50 text-[10px] outline-none">
                <input type="text" id="img" placeholder="Image URL (Image Address)" class="md:col-span-2 p-5 rounded-2xl bg-white border border-pink-50 text-[10px] outline-none">
                <input type="text" id="shopeeLink" placeholder="Shopee Link (https://...)" class="md:col-span-2 p-5 rounded-2xl bg-white border border-pink-50 text-[10px] outline-none">
            </div>
            <button onclick="addItem()" id="btnSimpan" class="w-full mt-8 bg-[#7a5c5c] text-white font-bold py-6 rounded-full text-[10px] tracking-widest shadow-xl uppercase hover:bg-[#5a4242] transition-colors">Enshrine to Katalog ✨</button>
        </div>

        <div id="content" class="space-y-32"></div>
    </div>

    <script>
        const CLIENT_ID = "933906511221-0moeldahtahrn7sjp2ju1np8k8hufs6c.apps.googleusercontent.com"; 

        window.onload = () => {
            google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleAuth });
            google.accounts.id.renderButton(document.getElementById("googleBtn"), { theme: "outline", size: "large" });
            
            const email = localStorage.getItem('user_email');
            if(email) loadData();
        };

        function handleAuth(res) {
            const p = JSON.parse(atob(res.credential.split('.')[1]));
            localStorage.setItem('user_email', p.email);
            location.reload();
        }

        async function loadData() {
            const res = await fetch(`/api/manage?email=${localStorage.getItem('user_email')}`);
            const data = await res.json();
            
            if (Array.isArray(data)) {
                // LOGIC: Check if identity exists in database items
                const identityItem = data.find(i => i.category === 'IDENTITY_SYS');
                if (!identityItem) {
                    document.getElementById('loginSection').classList.add('hidden-node');
                    document.getElementById('setupName').classList.remove('hidden-node');
                } else {
                    localStorage.setItem('my_name', identityItem.item_name);
                    document.getElementById('loginSection').classList.add('hidden-node');
                    showMainApp(data.filter(i => i.category !== 'IDENTITY_SYS'));
                }
            }
        }

        async function saveProfile() {
            const name = document.getElementById('coupleNames').value;
            if(!name) return;
            
            const body = {
                user_email: localStorage.getItem('user_email'),
                partner_name: name,
                category: 'IDENTITY_SYS',
                item_name: name,
                price: 0, img_url: '', product_link: ''
            };
            await fetch('/api/manage', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            location.reload();
        }

        function showMainApp(data) {
            document.getElementById('app').classList.remove('hidden-node');
            document.getElementById('specialFor').innerText = "Special for " + localStorage.getItem('my_name');
            render(data);
        }

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            
            // Grouping Logic
            const groups = data.reduce((r, a) => {
                r[a.category] = [...r[a.category] || [], a];
                return r;
            }, {});

            // Progress Logic
            const totalItems = data.length;
            // NOTE: Checkbox state is stored locally for now or you can add to DB if needed
            const checkedItems = JSON.parse(localStorage.getItem('checked_' + localStorage.getItem('user_email')) || "[]");
            const fulfilled = data.filter(i => checkedItems.includes(i.id)).length;
            const percent = totalItems > 0 ? Math.round((fulfilled / totalItems) * 100) : 0;
            
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').innerText = percent + '% Fulfilled';

            for (const cat in groups) {
                let html = `<div><h3 class="elegant italic text-3xl mb-12 text-[#d69e9e] border-b border-pink-100 pb-4 flex justify-between items-end">${cat} <span class="text-[10px] tracking-widest font-sans not-italic font-bold opacity-40 uppercase">${groups[cat].length} Items</span></h3><div class="grid grid-cols-2 md:grid-cols-4 gap-8">`;
                
                groups[cat].forEach(i => {
                    const isChecked = checkedItems.includes(i.id) ? 'checked' : '';
                    html += `
                        <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border-4 border-white relative group transition-all hover:shadow-xl">
                            <div class="aspect-[4/5] relative overflow-hidden">
                                <img src="${i.img_url || 'https://via.placeholder.com/400x500?text=Atelier+Visual'}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                                <a href="${i.product_link}" target="_blank" class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center">
                                    <span class="bg-white/90 px-4 py-2 rounded-full text-[8px] font-bold shadow-lg">SHOP ➔</span>
                                </a>
                            </div>
                            <div class="p-5">
                                <div class="flex items-start justify-between gap-2 mb-2">
                                    <div class="flex items-center gap-2">
                                        <input type="checkbox" id="check-${i.id}" ${isChecked} onchange="toggleCheck(${i.id})" class="accent-pink-300 w-4 h-4 cursor-pointer">
                                        <label for="check-${i.id}" class="elegant text-sm md:text-xl leading-tight line-clamp-1 cursor-pointer">${i.item_name}</label>
                                    </div>
                                    <button onclick="deleteItem(${i.id})" class="text-pink-200 hover:text-pink-400 font-bold text-[10px]">✕</button>
                                </div>
                                <p class="text-[#d69e9e] font-bold text-[10px] italic">Rp${i.price.toLocaleString('id-ID')}</p>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            }
        }

        function toggleCheck(id) {
            let checked = JSON.parse(localStorage.getItem('checked_' + localStorage.getItem('user_email')) || "[]");
            if (checked.includes(id)) checked = checked.filter(x => x !== id);
            else checked.push(id);
            localStorage.setItem('checked_' + localStorage.getItem('user_email'), JSON.stringify(checked));
            location.reload();
        }

        async function addItem() {
            const body = {
                user_email: localStorage.getItem('user_email'),
                partner_name: localStorage.getItem('my_name'),
                category: document.getElementById('cat').value,
                item_name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value) || 0,
                img_url: document.getElementById('img').value,
                product_link: document.getElementById('shopeeLink').value.trim()
            };
            await fetch('/api/manage', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            location.reload();
        }

        function burstSparkle() {
            confetti({
                particleCount: 150, spread: 70, origin: { y: 0.6 },
                colors: ['#e5b3b3', '#f2d1d1', '#ffffff', '#7a5c5c'],
                shapes: ['circle'], scalar: 0.8
            });
        }

        async function deleteItem(id) { if(confirm("Hapus?")) { await fetch(`/api/manage?id=${id}`, { method: 'DELETE' }); location.reload(); } }
        function logout() { localStorage.removeItem('user_email'); location.reload(); }
    </script>
</body>
</html>
