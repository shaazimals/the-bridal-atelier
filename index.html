<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bridal Atelier | Your Precious Memories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at center, #fffafa 0%, #f9f0f0 100%);
            min-height: 100vh;
        }
        .charm { font-family: 'Charm', cursive; }
        .elegant { font-family: 'Playfair Display', serif; }

        /* === ROSE GOLD GLOW SPARKLES === */
        .sparkle-container { position: relative; display: inline-block; }
        .glow-dot {
            position: absolute;
            background: #e5b3b3;
            border-radius: 50%;
            filter: blur(1px);
            box-shadow: 0 0 15px 5px rgba(229, 179, 179, 0.6);
            animation: sparklePulse 4s infinite ease-in-out;
            pointer-events: none;
            z-index: 20;
        }
        .glow-dot::before, .glow-dot::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            background: white; transform: translate(-50%, -50%);
        }
        .glow-dot::before { width: 1px; height: 150%; }
        .glow-dot::after { width: 150%; height: 1px; }

        @keyframes sparklePulse {
            0%, 100% { opacity: 0.5; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Frosted Glass */
        .frosted-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(40px);
            border: 1.5px solid rgba(229, 179, 179, 0.3);
            box-shadow: 0 40px 100px rgba(229, 179, 179, 0.1);
        }

        /* Custom Google Login */
        .custom-google-wrapper {
            position: relative;
            display: inline-flex;
            background: linear-gradient(135deg, #f2d1d1 0%, #e5b3b3 100%);
            padding: 2px;
            border-radius: 9999px;
            box-shadow: 0 10px 25px rgba(229, 179, 179, 0.4);
        }
        #googleBtn { position: absolute; inset: 0; opacity: 0.01; z-index: 10; cursor: pointer; }
        .fake-btn {
            background: white;
            padding: 10px 24px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 14px;
            color: #7a5c5c;
        }

        .page-fade { transition: all 1s ease-in-out; }
        .hidden-fade { opacity: 0; transform: translateY(20px); pointer-events: none; }
    </style>
</head>
<body class="text-[#7a5c5c]">

    <div id="loginSection" class="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-6 page-fade">
        <div class="w-full max-w-4xl text-center">
            <p class="elegant italic text-[#d69e9e] text-base md:text-xl mb-4 md:mb-6 opacity-80 tracking-widest">In Harmony & Love</p>
            
            <div class="frosted-panel p-10 md:p-32 rounded-[2.5rem] md:rounded-[4rem] relative overflow-hidden">
                <div class="sparkle-container mb-6 md:mb-8">
                    <div class="glow-dot w-2 md:w-3 h-2 md:h-3 -top-4 md:-top-6 -left-6 md:-left-10"></div>
                    <div class="glow-dot w-2 h-2 top-0 -right-6 md:-right-10"></div>
                    
                    <h2 class="charm text-5xl md:text-[8rem] text-[#d69e9e] leading-tight">The Bridal Atelier</h2>
                </div>

                <p class="elegant italic text-[9px] md:text-[10px] tracking-[0.3em] md:tracking-[0.5em] uppercase text-[#b4a096] mb-10 md:mb-16">
                    Curating your precious memories
                </p>

                <div class="custom-google-wrapper">
                    <div id="googleBtn"></div>
                    <div class="fake-btn">
                        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18" alt="G">
                        Login with Google Account ✨
                    </div>
                </div>
                
                <p class="text-[9px] mt-24 opacity-40 tracking-[0.3em] uppercase font-bold italic">By Haazima</p>
            </div>
        </div>
    </div>

    <div id="setupName" class="fixed inset-0 z-[110] flex items-center justify-center p-4 page-fade hidden hidden-fade">
        <div class="w-full max-w-sm text-center">
            <h3 class="charm text-5xl md:text-6xl text-[#d69e9e] mb-8 md:mb-10">Personalize</h3>
            <div class="frosted-panel p-8 md:p-12 rounded-[2.5rem] space-y-4 md:space-y-6">
                <input type="text" id="inputUser" placeholder="Her Name" class="w-full p-4 md:p-5 rounded-2xl bg-white/70 border-none text-center outline-none focus:ring-2 focus:ring-[#f2d1d1]">
                <input type="text" id="inputPartner" placeholder="His Name" class="w-full p-4 md:p-5 rounded-2xl bg-white/70 border-none text-center outline-none focus:ring-2 focus:ring-[#f2d1d1]">
                <button onclick="saveProfile()" class="w-full bg-gradient-to-r from-pink-200 to-[#e5b3b3] text-white font-bold py-4 md:py-5 rounded-full text-xs uppercase tracking-widest shadow-lg">
                    Begin Our Chapter ✨
                </button>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-4xl mx-auto px-4 md:px-6 pt-10 md:pt-28 page-fade hidden hidden-fade pb-40">
        <header class="flex flex-col md:flex-row justify-between items-center mb-16 md:mb-28 gap-6 md:gap-12">
            <div class="text-center md:text-left">
                <p class="elegant italic text-[#d69e9e] text-lg md:text-2xl">The Bridal Atelier</p>
                <h1 id="titleDisplay" class="charm text-5xl md:text-8xl text-[#7a5c5c] mt-2 tracking-wide">Siti & Maas</h1>
                <button onclick="logout()" class="text-[9px] tracking-[0.4em] uppercase mt-4 opacity-40 hover:opacity-100 transition-opacity">— Sign Out</button>
            </div>
            <div class="bg-white/60 backdrop-blur-xl p-6 md:p-12 rounded-[2.5rem] md:rounded-[4rem] border border-[#f2d1d1] text-center shadow-sm w-full md:w-auto">
                <p class="text-[9px] font-bold uppercase tracking-[0.3em] mb-2 text-[#d69e9e]">Treasures Value</p>
                <p id="totalPrice" class="text-3xl md:text-5xl font-bold text-[#7a5c5c] tracking-tighter">Rp0</p>
            </div>
        </header>

        <div class="frosted-panel p-6 md:p-12 mb-20 md:mb-32 rounded-[2.5rem]">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                <select id="cat" class="w-full p-4 md:p-5 rounded-2xl bg-white/70 border-none text-[10px] font-bold outline-none appearance-none cursor-pointer">
                    <option>Wedding Attire</option><option>Bridal Beauty</option><option>Jewelry</option><option>The Ceremony</option>
                </select>
                <input type="number" id="price" placeholder="Value (Rp)" class="w-full p-4 md:p-5 rounded-2xl bg-white/70 border-none text-[10px] outline-none">
                <input type="text" id="name" placeholder="Item name..." class="md:col-span-2 w-full p-4 md:p-5 rounded-2xl bg-white/70 border-none text-[10px] outline-none">
                <input type="text" id="img" placeholder="Pinterest Image Link" class="md:col-span-2 w-full p-4 md:p-5 rounded-2xl bg-white/70 border-none text-[10px] outline-none">
            </div>
            <button onclick="addItem()" id="btnSimpan" class="w-full mt-6 md:mt-10 bg-gradient-to-r from-pink-100 to-[#e5b3b3] text-[#7a5c5c] font-bold py-4 md:py-6 rounded-full text-[10px] uppercase tracking-widest shadow-md">
                Add to Love List ✨
            </button>
        </div>

        <div id="content" class="space-y-20 md:space-y-40"></div>
    </div>

    <script>
        const CLIENT_ID = "933906511221-0moeldahtahrn7sjp2ju1np8k8hufs6c.apps.googleusercontent.com"; 

        window.onload = () => {
            google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById("googleBtn"), { 
                theme: "outline", size: "large", width: 250 
            });
            
            const userEmail = localStorage.getItem('user_email');
            const myName = localStorage.getItem('my_name');
            const partnerName = localStorage.getItem('partner_name');

            if(!userEmail) {
                document.getElementById('loginSection').classList.remove('hidden-fade');
            } else if(!myName || !partnerName) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('setupName').classList.remove('hidden');
                setTimeout(() => document.getElementById('setupName').classList.remove('hidden-fade'), 50);
            } else {
                document.getElementById('loginSection').classList.add('hidden');
                showMainApp();
            }
        };

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('user_email', payload.email);
            location.reload();
        }

        function saveProfile() {
            const m = document.getElementById('inputUser').value;
            const p = document.getElementById('inputPartner').value;
            if(m && p) {
                localStorage.setItem('my_name', m);
                localStorage.setItem('partner_name', p);
                location.reload();
            }
        }

        function showMainApp() {
            const app = document.getElementById('app');
            app.classList.remove('hidden');
            setTimeout(() => app.classList.remove('hidden-fade'), 50);
            document.getElementById('titleDisplay').innerText = `${localStorage.getItem('my_name')} & ${localStorage.getItem('partner_name')}`;
            loadData();
        }

        async function loadData() {
            const email = localStorage.getItem('user_email');
            const res = await fetch(`/api/manage?email=${email}`);
            const data = await res.json();
            render(Array.isArray(data) ? data : []);
        }

        async function addItem() {
            const body = {
                user_email: localStorage.getItem('user_email'),
                partner_name: `${localStorage.getItem('my_name')} & ${localStorage.getItem('partner_name')}`,
                category: document.getElementById('cat').value,
                item_name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value) || 0,
                img_url: document.getElementById('img').value || ''
            };
            await fetch('/api/manage', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            loadData();
            document.getElementById('name').value = ''; document.getElementById('price').value = ''; document.getElementById('img').value = '';
        }

        function render(data) {
            const container = document.getElementById('content');
            const totalDisplay = document.getElementById('totalPrice');
            container.innerHTML = '';
            const total = data.reduce((s, i) => s + i.price, 0);
            totalDisplay.innerText = `Rp${total.toLocaleString('id-ID')}`;
            const grouped = data.reduce((r, a) => { r[a.category] = [...r[a.category] || [], a]; return r; }, {});

            for (const cat in grouped) {
                let html = `
                    <div class="fade-in-up">
                        <div class="flex items-center gap-4 md:gap-10 mb-8 md:mb-16">
                            <h3 class="elegant italic text-xl md:text-3xl">${cat}</h3>
                            <div class="h-[1px] flex-grow bg-[#e5b3b3]/30"></div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-6 md:gap-16">`;
                
                grouped[cat].forEach(i => {
                    html += `
                        <div class="bg-white rounded-[1.5rem] md:rounded-[4rem] overflow-hidden shadow-sm border-[4px] md:border-[10px] border-white relative group">
                            <div class="relative aspect-[4/5] overflow-hidden">
                                <button onclick="deleteItem(${i.id})" class="absolute top-2 md:top-6 right-2 md:right-6 bg-white/90 text-[#d69e9e] w-6 md:w-12 h-6 md:h-12 rounded-full z-20 md:opacity-0 group-hover:opacity-100 transition-all font-bold">✕</button>
                                <img src="${i.img_url || 'https://via.placeholder.com/600x800'}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000">
                            </div>
                            <div class="p-4 md:p-10">
                                <p class="text-[7px] md:text-[9px] text-[#d69e9e] uppercase tracking-widest mb-1 md:mb-4">${cat}</p>
                                <p class="elegant text-[10px] md:text-2xl leading-tight line-clamp-1">${i.item_name}</p>
                                <p class="text-[#d69e9e] font-bold text-[9px] md:text-xl mt-1 md:mt-4 italic">Rp${i.price.toLocaleString('id-ID')}</p>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            }
        }

        async function deleteItem(id) { if(confirm("Remove?")) { await fetch(`/api/manage?id=${id}`, { method: 'DELETE' }); loadData(); } }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
