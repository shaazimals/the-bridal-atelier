<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bridal Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at center, #ffffff 0%, #f9f0f0 100%); min-height: 100vh; color: #7a5c5c; margin: 0; }
        .charm { font-family: 'Charm', cursive; }
        .elegant { font-family: 'Playfair Display', serif; }
        .glow-dot { position: absolute; background: #e5b3b3; border-radius: 50%; filter: blur(1px); box-shadow: 0 0 15px 5px rgba(229, 179, 179, 0.6); animation: sparklePulse 4s infinite ease-in-out; pointer-events: none; z-index: 20; }
        .glow-dot::before, .glow-dot::after { content: ''; position: absolute; top: 50%; left: 50%; background: white; transform: translate(-50%, -50%); }
        .glow-dot::before { width: 1px; height: 180%; } .glow-dot::after { width: 180%; height: 1px; }
        @keyframes sparklePulse { 0%, 100% { opacity: 0.5; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }
        .frosted-panel { background: rgba(255, 255, 255, 0.35); backdrop-filter: blur(40px); border: 1.5px solid rgba(229, 179, 179, 0.3); border-radius: 40px; }
        .btn-rose { background: linear-gradient(135deg, #f2d1d1 0%, #e5b3b3 100%); color: white; transition: 0.3s; }
        .page-fade { transition: all 1s ease-in-out; }
        .hidden-fade { opacity: 0; pointer-events: none; transform: translateY(20px); }
        #googleBtn { position: absolute; inset: 0; opacity: 0.01; z-index: 50; }
        .copyright { font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; opacity: 0.5; font-style: italic; }
    </style>
</head>
<body>

    <div id="loginSection" class="fixed inset-0 z-[100] flex items-center justify-center p-4 page-fade">
        <div class="w-full max-w-4xl text-center">
            <div class="frosted-panel p-10 md:p-32 relative shadow-2xl">
                <div class="sparkle-container mb-8 inline-block relative">
                    <div class="glow-dot w-3 h-3 -top-6 -left-8"></div>
                    <div class="glow-dot w-2 h-2 top-0 -right-8"></div>
                    <h2 class="charm text-5xl md:text-8xl text-[#d69e9e]">The Bridal Atelier</h2>
                </div>
                <div class="mt-10 relative inline-flex bg-white px-8 py-4 rounded-full shadow-lg border border-pink-100 items-center gap-3">
                    <div id="googleBtn"></div>
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18">
                    <span class="font-bold text-[12px]">Authenticate Sanctuary ✨</span>
                </div>
                <div class="copyright mt-12">Developed with Love by Haazima © 2026</div>
            </div>
        </div>
    </div>

    <div id="setupName" class="fixed inset-0 z-[110] flex items-center justify-center p-4 page-fade hidden hidden-fade">
        <div class="w-full max-w-md text-center">
            <div class="frosted-panel p-10 space-y-6 shadow-xl">
                <h3 class="charm text-5xl text-[#d69e9e]">The Happy Couple</h3>
                <input type="text" id="inputUser" placeholder="Her Name" class="w-full p-4 rounded-2xl bg-white/70 text-center outline-none border border-pink-50">
                <input type="text" id="inputPartner" placeholder="His Name" class="w-full p-4 rounded-2xl bg-white/70 text-center outline-none border border-pink-50">
                <button onclick="saveProfile()" class="w-full btn-rose py-4 rounded-full font-bold uppercase text-[10px] tracking-widest">Begin Our Story ✨</button>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-5xl mx-auto px-4 pt-10 page-fade hidden hidden-fade pb-40">
        <header class="flex flex-col md:flex-row justify-between items-center mb-16 gap-8 text-center md:text-left">
            <div>
                <p class="elegant italic text-[#d69e9e] text-xl">The Eternal Collection of</p>
                <h1 id="titleDisplay" class="charm text-6xl md:text-7xl mt-2">Couple</h1>
                <button onclick="logout()" class="bg-white/50 px-6 py-2 rounded-full border border-pink-100 text-[9px] uppercase mt-4 text-[#d69e9e] font-bold tracking-widest">LEAVE ATELIER</button>
            </div>
            <div class="bg-white/60 p-8 rounded-[2.5rem] border border-[#f2d1d1] shadow-sm w-full md:w-auto">
                <p class="text-[9px] font-bold tracking-[0.4em] mb-2 text-[#d69e9e]">TOTAL INVESTMENT</p>
                <p id="totalPrice" class="text-3xl font-bold tracking-tighter">Rp0</p>
            </div>
        </header>

        <div class="frosted-panel p-6 md:p-10 mb-20 rounded-[2rem]">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <select id="cat" class="w-full p-4 rounded-xl bg-white/70 text-[10px] font-bold outline-none border border-pink-50">
                    <option>✨ The Bridal Attire</option><option>💄 Grace & Beauty</option><option>💍 Sacred Jewelry</option><option>🕊️ The Ceremony Needs</option>
                </select>
                <input type="number" id="price" placeholder="Estimated Price (Rp)" class="w-full p-4 rounded-xl bg-white/70 text-[10px] outline-none border border-pink-50">
                <input type="text" id="name" placeholder="Name of your desire..." class="md:col-span-2 w-full p-4 rounded-xl bg-white/70 text-[10px] outline-none border border-pink-50">
                <div class="md:col-span-2">
                    <label class="block text-[8px] font-bold mb-2 text-[#d69e9e] tracking-widest uppercase">Visual Inspiration (Screenshot)</label>
                    <input type="file" id="fileImg" accept="image/*" class="w-full p-3 rounded-xl bg-white/70 text-[10px] border border-dashed border-[#e5b3b3]">
                </div>
                <input type="text" id="shopeeLink" placeholder="Shopee Product Link (🧡)" class="md:col-span-2 w-full p-4 rounded-xl bg-white/70 text-[10px] border border-pink-50">
            </div>
            <button onclick="addItem()" id="btnSimpan" class="w-full mt-8 btn-rose py-5 rounded-full font-bold text-[10px] tracking-[0.2em] uppercase">Enshrine to List ✨</button>
        </div>
        <div id="content" class="grid grid-cols-2 md:grid-cols-3 gap-6"></div>
        <div class="text-center py-20 copyright">Developed with Love by Haazima © 2026</div>
    </div>

    <script>
        const CLIENT_ID = "933906511221-0moeldahtahrn7sjp2ju1np8k8hufs6c.apps.googleusercontent.com"; 

        window.onload = () => {
            google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById("googleBtn"), { theme: "outline", size: "large" });
            if(!localStorage.getItem('user_email')) document.getElementById('loginSection').classList.remove('hidden-fade');
            else if(!localStorage.getItem('my_name')) { document.getElementById('loginSection').style.display='none'; document.getElementById('setupName').classList.remove('hidden'); setTimeout(()=>document.getElementById('setupName').classList.remove('hidden-fade'),50); }
            else { document.getElementById('loginSection').style.display='none'; showMainApp(); }
        };

        function handleCredentialResponse(response) {
            const p = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('user_email', p.email);
            location.reload();
        }

        function saveProfile() {
            const m = document.getElementById('inputUser').value, p = document.getElementById('inputPartner').value;
            if(m && p) { localStorage.setItem('my_name', m); localStorage.setItem('partner_name', p); location.reload(); }
        }

        function logout() { if(confirm("Tinggalkan Atelier? ❤️")) { localStorage.clear(); location.reload(); } }

        function showMainApp() {
            document.getElementById('app').classList.remove('hidden');
            setTimeout(()=>document.getElementById('app').classList.remove('hidden-fade'),50);
            document.getElementById('titleDisplay').innerText = localStorage.getItem('my_name') + " & " + localStorage.getItem('partner_name');
            loadData();
        }

        async function addItem() {
            const btn = document.getElementById('btnSimpan'); btn.innerText = "Saving...";
            const file = document.getElementById('fileImg').files[0];
            let img = 'https://via.placeholder.com/600x800';
            if(file) img = await new Promise(r => { const f = new FileReader(); f.readAsDataURL(file); f.onload = () => r(f.result); });

            const body = {
                user_email: localStorage.getItem('user_email'),
                partner_name: localStorage.getItem('my_name') + " & " + localStorage.getItem('partner_name'),
                category: document.getElementById('cat').value,
                item_name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value) || 0,
                img_url: img,
                product_link: document.getElementById('shopeeLink').value.trim() || '#'
            };
            await fetch('/api/manage', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            loadData(); btn.innerText = "Enshrine to List ✨";
        }

        async function loadData() {
            const res = await fetch('/api/manage?email=' + localStorage.getItem('user_email'));
            const data = await res.json();
            render(Array.isArray(data) ? data : []);
        }

        // FUNGSI BUKA LINK ANTI BLANK
        function openLink(url) {
            if(!url || url === '#') return;
            // Membersihkan link dari spasi
            const cleanUrl = url.trim();
            // Membuka di tab yang sama agar tidak kena blokir browser mobile
            window.location.assign(cleanUrl);
        }

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            document.getElementById('totalPrice').innerText = "Rp" + data.reduce((s,i)=>s+i.price,0).toLocaleString('id-ID');
            
            data.forEach(i => {
                const isClickable = i.product_link && i.product_link !== '#';
                container.innerHTML += `
                    <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border-[6px] border-white relative group">
                        <div class="aspect-[4/5] relative overflow-hidden" ${isClickable ? `onclick="openLink('${i.product_link}')"` : ''}>
                            <img src="${i.img_url}" class="w-full h-full object-cover">
                            ${isClickable ? `<div class="absolute inset-0 bg-black/5 flex items-center justify-center"><span class="bg-white/90 px-4 py-2 rounded-full text-[8px] font-bold">SHOP NOW 🧡</span></div>` : ''}
                        </div>
                        <div class="p-4">
                            <button onclick="deleteItem(${i.id})" class="absolute top-3 right-3 bg-white/90 text-[#d69e9e] w-7 h-7 rounded-full font-bold text-[10px]">✕</button>
                            <p class="elegant text-[10px] md:text-xl leading-tight line-clamp-2">${i.item_name}</p>
                            <p class="text-[#d69e9e] font-bold text-[9px] mt-2 italic">Rp${i.price.toLocaleString('id-ID')}</p>
                        </div>
                    </div>`;
            });
        }

        async function deleteItem(id) { if(confirm("Hapus?")) { await fetch('/api/manage?id=' + id, { method: 'DELETE' }); loadData(); } }
    </script>
</body>
</html>
