<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VowsDB | Seserahan Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f9fafb; }
        .romantic { font-family: 'Dancing Script', cursive; }
        .shopee-card { box-shadow: 0 1px 1px rgba(0,0,0,0.05); border-radius: 4px; overflow: hidden; background: white; }
    </style>
</head>
<body>

    <div id="welcome" class="fixed inset-0 z-[100] bg-gradient-to-br from-pink-300 to-blue-300 flex items-center justify-center p-6 hidden">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="romantic text-4xl text-pink-500 mb-4">Lovely Wedding</h2>
            <p class="text-xs text-gray-400 mb-6 uppercase tracking-widest">Special for Inisial Pasangan</p>
            <input type="text" id="partnerInput" placeholder="Contoh: Siti & Ahmad" class="w-full p-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-pink-300 text-center mb-4">
            <button onclick="startSession()" class="w-full bg-pink-500 text-white font-bold py-4 rounded-2xl">Buka Katalog ✨</button>
            <p class="mt-4 text-[10px] text-gray-300">Developed by Haazima</p>
        </div>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen pb-10">
        <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md p-4 border-b border-pink-100 flex justify-between items-center">
            <div>
                <h1 id="titleDisplay" class="romantic text-2xl text-pink-500 leading-none">VowsDB</h1>
                <p class="text-[9px] text-blue-400 font-bold uppercase mt-1">Wedding Registry List</p>
            </div>
            <div class="text-right">
                <p id="totalPrice" class="text-lg font-bold text-gray-800">Rp0</p>
                <p class="text-[9px] text-gray-400 uppercase">Estimated Budget</p>
            </div>
        </header>

        <div class="p-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-50 space-y-3 mb-6">
                <div class="grid grid-cols-2 gap-2">
                    <select id="cat" class="bg-gray-50 p-3 rounded-xl border-none text-xs font-bold">
                        <option>Skincare</option><option>Body Care</option><option>Fashion</option><option>Ibadah</option>
                    </select>
                    <input type="number" id="price" placeholder="Harga (Rp)" class="bg-gray-50 p-3 rounded-xl border-none text-xs">
                </div>
                <input type="text" id="name" placeholder="Nama Barang" class="w-full bg-gray-50 p-3 rounded-xl border-none text-xs">
                <input type="text" id="img" placeholder="Link Gambar (Copy Image Address)" class="w-full bg-gray-50 p-3 rounded-xl border-none text-xs">
                <button onclick="addItem()" class="w-full bg-pink-500 text-white font-bold py-3 rounded-xl text-sm shadow-lg shadow-pink-100">Simpan Ke Katalog</button>
            </div>

            <div id="content" class="space-y-8"></div>
        </div>

        <footer class="text-center py-6 opacity-30 text-[10px] uppercase tracking-[0.3em]">
            Developed by Haazima
        </footer>
    </div>

    <script>
        let partner = localStorage.getItem('vows_partner');

        window.onload = () => {
            if(!partner) document.getElementById('welcome').classList.remove('hidden');
            else {
                document.getElementById('titleDisplay').innerText = `For ${partner}`;
                loadData();
            }
        };

        function startSession() {
            const val = document.getElementById('partnerInput').value;
            if(!val) return alert("Isi nama dulu!");
            localStorage.setItem('vows_partner', val);
            location.reload();
        }

        async function loadData() {
            const res = await fetch(`/api/manage?partner=${partner}`);
            const data = await res.json();
            render(data);
        }

        async function addItem() {
            const body = {
                partner_name: partner,
                category: document.getElementById('cat').value,
                item_name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value) || 0,
                img_url: document.getElementById('img').value
            };
            await fetch('/api/manage', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            location.reload();
        }

        async function deleteItem(id) {
            if(confirm("Hapus barang?")) {
                await fetch(`/api/manage?id=${id}`, { method: 'DELETE' });
                loadData();
            }
        }

        function render(data) {
            const container = document.getElementById('content');
            const totalDisplay = document.getElementById('totalPrice');
            container.innerHTML = '';
            
            const total = data.reduce((s, i) => s + i.price, 0);
            totalDisplay.innerText = `Rp${total.toLocaleString('id-ID')}`;

            const grouped = data.reduce((r, a) => {
                r[a.category] = [...r[a.category] || [], a];
                return r;
            }, {});

            for (const cat in grouped) {
                let html = `<div><h3 class="font-bold text-xs text-blue-400 mb-3 border-b border-blue-50 pb-1 uppercase tracking-widest">${cat}</h3><div class="grid grid-cols-2 gap-3">`;
                grouped[cat].forEach(i => {
                    html += `
                        <div class="shopee-card relative group">
                            <button onclick="deleteItem(${i.id})" class="absolute top-1 right-1 bg-black/20 text-white w-5 h-5 rounded-full text-[8px] z-10 opacity-0 group-hover:opacity-100">✕</button>
                            <img src="${i.img_url}" class="w-full aspect-square object-cover" onerror="this.src='https://via.placeholder.com/200?text=Produk'">
                            <div class="p-2">
                                <p class="text-[11px] text-gray-600 line-clamp-2 h-8 leading-tight mb-1">${i.item_name}</p>
                                <p class="text-pink-500 font-bold text-sm leading-none">Rp${i.price.toLocaleString('id-ID')}</p>
                                <div class="mt-2 text-[8px] bg-pink-50 text-pink-400 inline-block px-1 font-bold">SESERAHAN</div>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            }
        }
    </script>
</body>
</html>
